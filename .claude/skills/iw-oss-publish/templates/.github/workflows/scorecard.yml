# OpenSSF Scorecard — automated security posture scoring
# Docs: https://github.com/ossf/scorecard-action
# Results published to: https://scorecard.dev/viewer/?uri=github.com/{org}/{repo}

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 4 * * 1"  # weekly, Monday 04:30 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF
      id-token: write          # publish results to public dashboard
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # show badge at scorecard.dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
