name: Bug report
description: Report a defect or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please provide enough detail for us to reproduce the issue.

        **Security issues**: do NOT file here. See [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: When I do X, I expected Y, but got Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible example. Include commands, inputs, and configuration.
      placeholder: |
        1. Run `...`
        2. Observe output `...`
        3. Expected `...` but got `...`
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the project are you running? (output of `--version` or git SHA)
      placeholder: "v0.2.0 / abc123d"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Relevant versions (runtime, deps), configuration, shell, etc.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have read the [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
