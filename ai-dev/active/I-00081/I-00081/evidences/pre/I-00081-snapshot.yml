              - generic [ref=e147]: "Mermaid error: No diagram type detected matching given configuration for text: # IW AI Core Platform — Architecture Diagram > **Why this diagram?** Use this diagram to understand the complete physical topology of the IW AI Core platform — which processes run, which ports they use, how human traffic (dashboard), agent traffic (CLI), and daemon orchestration traffic flow, and how the single PostgreSQL database serves all projects simultaneously. ```mermaid --- config: layout: elk --- flowchart TB subgraph platform[\"Platform (iw-ai-core repo)\"] DB[((\"PostgreSQL<br/>port 5433\"))] Dashboard[\"Dashboard<br/>FastAPI · port 9900\"] Daemon[\"Daemon<br/>Python polling loop\"] CLI[\"iw CLI<br/>Click · pip install\"] Executor[\"Executor Scripts<br/>Bash · worktree_*\"] end subgraph projects[\"Managed Project Repos\"] P1[\"innoforge<br/>(iw-doc-plan)\"] P2[\"project-b\"] P3[\"project-c\"] end subgraph agents[\"LLM Agents (per worktree)\"] A1[\"opencode / claude-code<br/>in .worktrees/\"] A2[\"opencode / claude-code\"] A3[\"opencode / claude-code\"] end DB <-->|SQL queries| Daemon DB <-->|SQL queries| Dashboard DB <-->|SQL queries| CLI Daemon -->|worktree_setup.sh| P1 Daemon -->|worktree_setup.sh| P2 Daemon -->|worktree_setup.sh| P3 Daemon -->|step_executor.sh| A1 Daemon -->|step_executor.sh| A2 Daemon -->|step_executor.sh| A3 CLI -->|iw step-done / approve| DB A1 -->|iw CLI calls| CLI A2 -->|iw CLI calls| CLI A3 -->|iw CLI calls| CLI Dashboard -->|http / SSE| Human[(\"Human<br/>Browser\")] Human -->|http / SSE| Dashboard P1 -.->|.worktrees/| A1 P2 -.->|.worktrees/| A2 P3 -.->|.worktrees/| A3 style DB fill:#D1FAE5,stroke:#10B981,color:#065F46 style Dashboard fill:#EDE9FE,stroke:#8B5CF6,color:#3B0764 style Daemon fill:#FEF3C7,stroke:#F59E0B,color:#78350F style CLI fill:#DBEAFE,stroke:#3B82F6,color:#1E3A5F style Executor fill:#FEF3C7,stroke:#F59E0B,color:#78350F style P1 fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style P2 fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style P3 fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style A1 fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style A2 fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style A3 fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style Human fill:#F3F4F6,stroke:#9CA3AF,color:#374151 ``` --- > **Why this diagram?** Use this diagram to trace the end-to-end lifecycle of a work item — from human approval through daemon orchestration, agent execution in a git worktree, step completion reporting via `iw CLI`, to merge and archival. It shows every major data flow and which component is responsible for each stage. ```mermaid --- config: layout: elk --- flowchart LR Human[\"Human<br/>Dashboard\"] -->|approve| DB[((\"PostgreSQL\"))] DB -->|polls approved| Daemon[\"Daemon<br/>60s loop\"] Daemon -->|worktree_setup.sh| Worktree[\"Git Worktree<br/>.worktrees/{id}/\"] Daemon -->|opencode run| Agent[\"LLM Agent<br/>(opencode / claude)\"] Agent -->|reads design doc| Worktree Agent -->|iw step-start| CLI[\"iw CLI\"] CLI -->|UPDATE steps| DB Agent -->|iw step-done| CLI CLI -->|UPDATE steps| DB Daemon -->|worktree_commit.sh| Git[\"Git Main<br/>squash-merge\"] DB -->|Tier 1| DesignDoc[\"Design Doc<br/>DB TEXT column\"] DB -->|Tier 2| Archive[\"archive/{project}/{id}.tar.zst\"] DB -->|Tier 1| Report[\"Step Reports<br/>DB TEXT column\"] style DB fill:#D1FAE5,stroke:#10B981,color:#065F46 style Daemon fill:#FEF3C7,stroke:#F59E0B,color:#78350F style CLI fill:#DBEAFE,stroke:#3B82F6,color:#1E3A5F style Agent fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style Worktree fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style Human fill:#F3F4F6,stroke:#9CA3AF,color:#374151 style Git fill:#F3F4F6,stroke:#9CA3AF,color:#374151 style DesignDoc fill:#D1FAE5,stroke:#10B981,color:#065F46 style Archive fill:#D1FAE5,stroke:#10B981,color:#065F46 style Report fill:#D1FAE5,stroke:#10B981,color:#065F46 ``` --- > **Why this diagram?** Use this diagram to understand the database schema structure — the core tables, their primary keys, and the foreign-key relationships that enforce multi-project isolation. It shows the full operational data model without archiving or RAG extensions. ```mermaid --- config: layout: elk --- erDiagram PROJECTS ||--o{ ID_SEQUENCES : \"\" PROJECTS ||--o{ WORK_ITEMS : \"\" PROJECTS ||--o{ BATCHES : \"\" WORK_ITEMS ||--o{ WORKFLOW_STEPS : \"\" WORK_ITEMS }o--o{ WORK_ITEMS : \"depends_on\" WORKFLOW_STEPS ||--o{ STEP_RUNS : \"\" WORKFLOW_STEPS ||--o{ FIX_CYCLES : \"\" BATCHES ||--o{ BATCH_ITEMS : \"\" BATCH_ITEMS }o--|| WORK_ITEMS : \"\" DAEMON_EVENTS ||--o| PROJECTS : \"\" PROJECTS { id PK \"\" display_name \"\" repo_root \"\" enabled \"\" config JSONB \"\" } ID_SEQUENCES { project_id PK FK \"\" prefix PK \"\" next_number \"\" } WORK_ITEMS { project_id PK FK \"\" id PK \"\" type \"\" title \"\" status \"\" phase \"\" design_doc_path \"\" design_doc_content TEXT \"\" summary TEXT \"\" archive_path TEXT \"\" archived_at \"\" } WORKFLOW_STEPS { id PK \"\" project_id FK \"\" work_item_id FK \"\" step_number \"\" agent \"\" status \"\" report_file \"\" report_content TEXT \"\" started_at \"\" completed_at \"\" } STEP_RUNS { id PK \"\" step_id FK \"\" run_number \"\" status \"\" pid \"\" pid_alive \"\" command \"\" worktree_path \"\" timeout_secs \"\" last_heartbeat \"\" started_at \"\" completed_at \"\" duration_secs \"\" error_message TEXT \"\" } FIX_CYCLES { id PK \"\" step_id FK \"\" cycle_number \"\" trigger_type \"\" status \"\" created_at \"\" } BATCHES { project_id PK FK \"\" id PK \"\" status \"\" max_parallel \"\" created_at \"\" } BATCH_ITEMS { project_id FK \"\" batch_id FK \"\" work_item_id FK \"\" group_num \"\" status \"\" pid \"\" merged_at \"\" } DAEMON_EVENTS { id PK \"\" project_id FK \"\" event_type \"\" entity_id \"\" message \"\" event_metadata JSONB \"\" created_at \"\" } style PROJECTS fill:#D1FAE5,stroke:#10B981,color:#065F46 style ID_SEQUENCES fill:#D1FAE5,stroke:#10B981,color:#065F46 style WORK_ITEMS fill:#D1FAE5,stroke:#10B981,color:#065F46 st