            - code [ref=e370]: "--- config: layout: elk --- flowchart LR Human[\"Human<br/>Dashboard\"] -->|approve| DB[((\"PostgreSQL\"))] DB -->|polls approved| Daemon[\"Daemon<br/>60s loop\"] Daemon -->|worktree_setup.sh| Worktree[\"Git Worktree<br/>.worktrees/{id}/\"] Daemon -->|opencode run| Agent[\"LLM Agent<br/>(opencode / claude)\"] Agent -->|reads design doc| Worktree Agent -->|iw step-start| CLI[\"iw CLI\"] CLI -->|UPDATE steps| DB Agent -->|iw step-done| CLI CLI -->|UPDATE steps| DB Daemon -->|worktree_commit.sh| Git[\"Git Main<br/>squash-merge\"] DB -->|Tier 1| DesignDoc[\"Design Doc<br/>DB TEXT column\"] DB -->|Tier 2| Archive[\"archive/{project}/{id}.tar.zst\"] DB -->|Tier 1| Report[\"Step Reports<br/>DB TEXT column\"] style DB fill:#D1FAE5,stroke:#10B981,color:#065F46 style Daemon fill:#FEF3C7,stroke:#F59E0B,color:#78350F style CLI fill:#DBEAFE,stroke:#3B82F6,color:#1E3A5F style Agent fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style Worktree fill:#FEE2E2,stroke:#EF4444,color:#7F1D1D style Human fill:#F3F4F6,stroke:#9CA3AF,color:#374151 style Git fill:#F3F4F6,stroke:#9CA3AF,color:#374151 style DesignDoc fill:#D1FAE5,stroke:#10B981,color:#065F46 style Archive fill:#D1FAE5,stroke:#10B981,color:#065F46 style Report fill:#D1FAE5,stroke:#10B981,color:#065F46"
