# docker-compose.e2e.yml
# Per-worktree isolated stack for browser_verification steps.
#
# NEVER runs in parallel with the production dashboard on :9900 / postgres :5433.
# Ports are bound on 127.0.0.1 only, and each invocation sets its own:
#   - COMPOSE_PROJECT_NAME  (isolates container names + network + volumes)
#   - E2E_FRONTEND_PORT     (host port for the dashboard)
#   - E2E_DB_PORT           (host port for the isolated postgres)
#
# The variables are allocated per (project_id, item_id) by
# orch.daemon.browser_env.allocate_browser_env and scanned for freeness
# before compose-up runs.

services:
  e2e-db:
    image: postgres:15-alpine
    restart: "no"
    ports:
      - "127.0.0.1:${E2E_DB_PORT}:5432"
    environment:
      POSTGRES_DB: iw_e2e
      POSTGRES_USER: iw_e2e
      POSTGRES_PASSWORD: iw_e2e_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iw_e2e -d iw_e2e"]
      interval: 2s
      timeout: 3s
      retries: 20

  e2e-ollama:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    restart: "no"
    command: ["uv", "run", "python", "scripts/e2e_ollama_stub.py", "--port", "11434"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:11434/', timeout=2).read()\""]
      interval: 2s
      timeout: 3s
      retries: 20

  # Minimal daemon stub — advances queued doc_index_jobs / code_index_jobs
  # through running → completed so browser_verification V steps whose
  # assertions depend on daemon-driven lifecycle transitions (e.g.
  # F-00060 V1 "Re-index Docs job transitions to completed") can actually
  # observe the transition. The real orch.daemon.main is intentionally
  # NOT included here — it's too heavy (worktrees, LLM agents, merge
  # queue). See scripts/e2e_daemon_stub.py for the narrow scope.
  e2e-daemon-stub:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    restart: "no"
    depends_on:
      e2e-db:
        condition: service_healthy
      e2e-dashboard:
        # Start after the dashboard so migrations/seed have already run —
        # otherwise the stub would poll a DB with no tables.
        condition: service_healthy
    command: ["uv", "run", "python", "scripts/e2e_daemon_stub.py"]
    environment:
      IW_CORE_DB_HOST: e2e-db
      IW_CORE_DB_PORT: "5432"
      IW_CORE_DB_NAME: iw_e2e
      IW_CORE_DB_USER: iw_e2e
      IW_CORE_DB_PASSWORD: iw_e2e_dev
      E2E_DAEMON_STUB_LOG_LEVEL: INFO

  e2e-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    restart: "no"
    depends_on:
      e2e-db:
        condition: service_healthy
      e2e-ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:${E2E_FRONTEND_PORT}:9900"
    volumes:
      # Bind-mount the worktree's ai-dev/ on top of the image snapshot so
      # e2e_fixtures/*.py written AFTER image build (e.g. by a qv-browser
      # agent during S11) are visible to scripts/e2e_seed.py at entrypoint
      # time. Read-only: the container only consumes fixtures, never writes.
      - ./ai-dev:/app/ai-dev:ro
      # NOTE: do NOT bind-mount the host's ~/.claude/ here. The host's
      # rate-limits cache is owned by the developer's running Claude Code
      # session and the e2e stack must never write to it (`:ro` would
      # prevent qv-browser from controlling V1/V2/V3 anyway). The dashboard
      # reads `/app/.claude/rate-limits-cache.json` from the container's
      # writable layer (HOME=/app, see entrypoint mkdir). qv-browser
      # injects test cache via `docker exec` — see the prompt template.
    environment:
      # Unset IW_CORE_EXPECTED_INSTANCE_ID so the dashboard runs in bootstrap
      # mode against the fresh e2e DB (which has no iw_core_instance row).
      # The e2e_seed.py production guardrail already handles this case via
      # IW_E2E_SEED=1, but we also unset it here so the app lifespan
      # verify_instance_identity() call also runs in bootstrap mode.
      IW_CORE_EXPECTED_INSTANCE_ID: ""
      IW_CORE_DB_HOST: e2e-db
      IW_CORE_DB_PORT: "5432"
      IW_CORE_DB_NAME: iw_e2e
      IW_CORE_DB_USER: iw_e2e
      IW_CORE_DB_PASSWORD: iw_e2e_dev
      IW_CORE_DASHBOARD_HOST: "0.0.0.0"
      IW_CORE_DASHBOARD_PORT: "9900"
      IW_CORE_POLL_INTERVAL: "60"
      IW_CORE_STALL_THRESHOLD: "300"
      IW_CORE_PID_FILE: "/tmp/iw-core-e2e.pid"
      IW_CORE_ARCHIVE_DIR: "/tmp/iw-core-e2e-archive"
      IW_CORE_ARCHIVE_TTL: "0"
      IW_CORE_LOG_LEVEL: "INFO"
      IW_CORE_LOG_FILE: "/tmp/iw-core-e2e.log"
      IW_CORE_INDEX_PATH: "/tmp/iw-core-e2e-index"
      IW_E2E_OLLAMA_URL: "http://e2e-ollama:11434"
      IW_CORE_OPENCODE_BIN: /usr/local/bin/opencode
      IW_CORE_OPENCODE_PORT: "4096"
      IW_E2E_SEED: "1"
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python - <<'PY'
          import sys, urllib.request
          for path in ("/health", "/api/chat/config"):
              try:
                  resp = urllib.request.urlopen(f"http://localhost:9900{path}", timeout=2)
                  if resp.status != 200:
                      sys.exit(1)
              except Exception:
                  sys.exit(1)
          PY
      interval: 3s
      timeout: 5s
      retries: 60
