# Per-check authored copy for the OSS Compliance dashboard modal.
# Every check_id produced by skills/iw-oss-publish/scripts/checks/*.py MUST have an entry.
# CI test tests/unit/test_oss_catalog_completeness.py enforces this.
# Generated by .tmp/author_oss_catalog.sh from .tmp/oss_catalog_fragments/.

OSS-CA-01:
  what_it_checks: |
    The repository has a contributor agreement configured, either a Developer Certificate of Origin (DCO) or a Contributor License Agreement (CLA). The check reads the contributor_agreement setting from .iw/oss-publish.toml to determine which mode is active. In DCO mode, it requires .github/dco.yml to be present. In CLA mode, it requires .github/cla.yml and a CLA.md file to be present.
  how_it_tests: |
    The check calls ctx.exists(".github/dco.yml") to detect the DCO configuration file. For CLA mode it calls ctx.exists(".github/cla.yml", "CLA.md"). When no file is found in DCO mode, the finding carries auto_fix_available=True and the remediation points to `uv run iw oss fix OSS-CA-01 --apply` as the auto-apply path.
  risk_if_failing: |
    Without a DCO or CLA, every commit lacks a verifiable legal signature from its author. This means the project cannot prove that contributors have the right to contribute the code, which creates legal exposure if a contribution is later disputed or a license violation is discovered. Contributors also lack clear guidance on what sign-off means, leading to inconsistent commit metadata.
  how_to_fix: |
    Run `uv run iw oss fix OSS-CA-01 --apply` which renders .github/dco.yml from the included template and sets require.members=true. If CLA mode is needed, manually create CLA.md and configure cla-assistant or EasyCLA on the GitHub organization. Install the CNCF DCO GitHub App at https://github.com/apps/dco to enforce sign-off enforcement at the org level.
  references:
    - https://github.com/apps/dco
    - https://github.com/cncf/dco2
OSS-CA-02:
  what_it_checks: |
    Whether the CONTRIBUTING.md file explains how contributors should perform DCO sign-off when the project uses DCO mode. The check runs only when contributor_agreement is set to "DCO" in the oss-publish configuration.
  how_it_tests: |
    The check locates CONTRIBUTING.md by first looking for .github/CONTRIBUTING.md, then falling back to CONTRIBUTING.md in the repo root. If the file exists and the mode is DCO, the check reads the file contents, converts to lowercase, and searches for either the phrase "signed-off-by" or the phrase "git commit -s". If either appears in the file, the check passes. If the file is missing or contains neither phrase, the check fails. The auto_fix_available flag is set to true.
  risk_if_failing: |
    Contributors will not know to add a Signed-off-by trailer to their commit messages. Their commits will fail the DCO enforcement check and be rejected during the merge process, causing merge delays, repeated work, and contributor frustration.
  how_to_fix: |
    Add a sign-off explanation to CONTRIBUTING.md that instructs contributors to use `git commit -s` or to manually append `Signed-off-by: Name <email>` to each commit message. The iw-oss-publish tool provides an auto-apply template that can insert the standard sign-off block into CONTRIBUTING.md without manual editing.
OSS-CA-03:
  what_it_checks: |
    The GitHub branch protection rule on the default branch requires the DCO (Developer Certificate of Origin) status check. Without this, contributors can push commits directly to main without signing off, bypassing the DCO requirement that confirms they have the right to contribute the code.
  how_it_tests: |
    Calls `gh api /repos/{owner}/{repo}/branches/main/protection` and inspects `required_status_checks.checks` for an entry with context `dco`. Reports SKIP if the `gh` CLI is unavailable or the repo has no remote. When OSS-GH-01 runs in the same session, OSS-CA-03 stubs as SKIP to avoid duplicate reporting.
  risk_if_failing: |
    Unsigned commits land on main without legal acknowledgment from the author. This creates downstream license ambiguity — the project cannot rely on the DCO to resolve contributor disputes if the check was never enforced at merge time. Auditors and legal reviewers will flag this as a gap during open source readiness reviews.
  how_to_fix: |
    In the GitHub repo, go to Settings → Branches → edit the protection rule for `main`. Under "Require status checks before merging", add the `dco` check. If the check does not appear, install the CNCF DCO GitHub App first: https://github.com/apps/dco
  references:
    - https://baseline.openssf.org/versions/2025-02-25
OSS-CH-01:
  what_it_checks: |
    A README file exists at the root of the repository. The check looks for README.md, README.rst, README.txt, or a file named README with no extension. An open-source project without a README leaves contributors without installation instructions, usage examples, or any understanding of what the project does.
  how_it_tests: |
    The check calls ctx.exists() with the paths README.md, README.rst, README.txt, and README. If any of these resolve to an actual file in ctx.target, the check passes. The file size must be greater than zero; an empty file fails. The check runs against the repository root and does not search subdirectories.
  risk_if_failing: |
    Contributors cannot set up the project. Potential users bounce off the landing page without any guidance. Issue trackers fill with questions that a README would answer. Downstream packaging tools and GitHub UI render an empty or missing README, signaling low quality.
  how_to_fix: |
    Create a README.md at the repository root. The iw-oss-publish fix scaffold renders a README.md.j2 template; running the auto-fix for OSS-CH-01 produces a stub with placeholder sections for Installation, Usage, and Contributing that you fill in with project-specific content.
OSS-CH-02:
  what_it_checks: |
    The repository has a SECURITY.md file that contains clear vulnerability reporting instructions.
    The file must exist at the project root, .github/, or docs/ and must include a way to report
    security issues — either an email address or a link to GitHub Security Advisories.
  how_it_tests: |
    The check searches for SECURITY.md at SECURITY.md, .github/SECURITY.md, or docs/SECURITY.md.
    If found, it reads the file content and checks that it contains the word "report" and either
    an "@" character (email) or the substring "advisories" (GitHub Security Advisories link).
    If either the file is absent or the reporting path is missing, the check fails.
  risk_if_failing: |
    Security vulnerabilities in the project go unreported because contributors and end users
    have no guidance on where to send vulnerability reports. Researchers fall back to public
    issues, exposing the flaw to attackers before a fix is available.
    Legal and compliance requirements for an OSS security policy are not met.
  how_to_fix: |
    Create or update SECURITY.md with a reporting section. Include an email address such as
    security@example.com, a GitHub Security Advisories URL, or both. The iw-oss-publish tool
    auto-generates a compliant SECURITY.md via `uv run iw oss fix <CHECK_ID> --apply` when the file is absent.
  references:
    - https://docs.github.com/en/code-security/security-advisories/working-with-security-advisories/creating-a-security-advisory
OSS-CH-03:
  what_it_checks: |
    The repository contains a Code of Conduct file at one of the conventional paths.
    A CoC signals to contributors that the project takes community standards seriously
    and provides a reference point for conflict resolution. The check accepts files at
    the root, .github/, or docs/ to match common conventions.
  how_it_tests: |
    The check calls ctx.exists against three file paths in sequence:
    CODE_OF_CONDUCT.md, .github/CODE_OF_CONDUCT.md, and docs/CODE_OF_CONDUCT.md.
    It passes if any one of these paths resolves to an existing file.
    The check does not validate the CoC content—only its presence at an expected location.
  risk_if_failing: |
    Contributors encounter no formal community guidelines. When disputes arise,
    there is no shared reference for resolution, increasing the chance of unmoderated
    conflict that can drive contributors away or create legal liability for the organization.
    Some ecosystems and corporate policies now require a CoC as a condition of participation.
  how_to_fix: |
    Create a CODE_OF_CONDUCT.md file at the root of the repository, or in .github/ or docs/
    if preferred. Run `uv run iw oss fix <CHECK_ID> --apply` which renders a Contributor Covenant template
    automatically; run it with the project type set to oss to apply it.
  references: []

OSS-CH-04:
  what_it_checks: |
    The Contributor Covenant version used in the Code of Conduct file. The check runs only when a Code of Conduct is present (OSS-CH-03). It verifies the CoC explicitly references version 2.1 or version 3 of the Contributor Covenant standard.
  how_it_tests: |
    The check reads the CoC file path returned by OSS-CH-03 and searches the text for one of four version strings: "version/2/1", "version/3", "Contributor Covenant 2.1", or "Contributor Covenant 3". If "version/3" or "Contributor Covenant 3" is found the status is PASS. If only the v2.1 strings are found the status is PASS with a note that v3 is recommended. If the CoC is present but none of these strings are detected, the status is HUMAN_REQUIRED.
  risk_if_failing: |
    A Code of Conduct that does not declare a recognized Contributor Covenant version may be an outdated or custom document that lacks modern reporting, enforcement, and inclusion provisions. Contributors and maintainers then work without clear shared expectations, which increases the chance of unmoderated conflict and may deter participation from underrepresented groups.
  how_to_fix: |
    Replace the existing CoC with the latest version of the Contributor Covenant. Download v3 from https://www.contributor-covenant.org/version/3/0 or use the interactive builder at https://www.contributor-covenant.org/adopt. If v2.1 is already in use, plan an upgrade to v3 at the next major release cycle.
  references:
    - https://www.contributor-covenant.org/
    - https://www.contributor-covenant.org/version/3/0

OSS-CH-05:
  what_it_checks: |
    The Code of Conduct enforcement contact section references a group or alias email
    address rather than a personal email address. Projects that delegate enforcement
    responsibility to an individual personal inbox create a single point of failure
    for handling participant complaints.
  how_it_tests: |
    The check locates the CoC file by searching for CODE_OF_CONDUCT.md in the repository
    root, .github/, and docs/ in order of precedence. It reads the file text and searches
    for the configured group email address (default: info@innovation-ways.com). If the
    configured email appears anywhere in the CoC body the check passes. If not, it returns
    HUMAN_REQUIRED status and surfaces the remediation.
  risk_if_failing: |
    When enforcement responsibility lands on a personal inbox, complaints go unanswered
    when that person is on leave, changes roles, or leaves the company. Participants have
    no reliable channel to report conduct violations, which can escalate into contributor
    attrition, negative public incidents, or legal exposure if harassment is not handled
    promptly.
  how_to_fix: |
    Replace any personal enforcement email in CODE_OF_CONDUCT.md with a team alias such
    as info@innovation-ways.com that is owned by the organization and monitored
    continuously. If iw-oss-publish is configured with the correct company_contact_email
    value, the auto-fix template will update the CoC enforcement section automatically.

OSS-CH-06:
  what_it_checks: |
    The repository has a CONTRIBUTING.md file at the project root, .github/, or docs/ directory.
    This file explains how contributors should set up their development environment, structure
    their changes, and submit pull requests. Without it, the project lacks a documented
    contribution pathway.
  how_it_tests: |
    The check calls ctx.exists("CONTRIBUTING.md", ".github/CONTRIBUTING.md", "docs/CONTRIBUTING.md")
    and passes when at least one of these three paths is present as a file in the repository.
    The check performs no content inspection; that is handled separately by OSS-CH-07 for DCO
    sign-off coverage.
  risk_if_failing: |
    Potential contributors find a blank wall when trying to participate. They do not know which
    branch to target, how to run the test suite locally, whether commits must be signed, or what
    review timeline to expect. This produces low-quality pull requests, repeated informal questions,
    and contributor abandonment. Projects without a documented contribution path tend to remain
    single-maintainer and stall.
  how_to_fix: |
    Create a CONTRIBUTING.md file at the project root, .github/CONTRIBUTING.md, or docs/CONTRIBUTING.md.
    The iw-oss-publish skill ships an auto-fix template at skills/iw-oss-publish/templates/CONTRIBUTING.md.j2
    that populates the file with conventional commit format, DCO sign-off instructions, a PR checklist,
    and development setup sections. Run the auto-fix to generate a compliant file, then edit the
    placeholder sections to match project specifics.
  references:
    - https://www.contributor-covenant.org/
    - https://www.conventionalcommits.org/
    - https://developercertificate.org/

OSS-CH-07:
  what_it_checks: |
    The CONTRIBUTING file mentions the Developer Certificate of Origin (DCO) sign-off requirement. When a project uses DCO as its contributor agreement, contributors must know how to properly sign their commits. This check only runs when the project config sets `contributor_agreement: DCO`.
  how_it_tests: |
    The check locates the CONTRIBUTING file at one of three conventional paths (CONTRIBUTING.md, .github/CONTRIBUTING.md, or docs/CONTRIBUTING.md), reads its contents, and searches the lowercased body for any of three strings: "signed-off-by", "git commit -s", or "developer certificate of origin". If at least one is found, the check passes.
  risk_if_failing: |
    Contributors do not know they must sign their commits with `git commit -s`. Their commits get rejected or flagged by CI, creating friction and delayed merges. In some cases, contributions may be discarded because the submitter cannot meet an undocumented requirement.
  how_to_fix: |
    Add a section to CONTRIBUTING that explains the DCO sign-off process. Describe that every commit must include a `Signed-off-by` line and show the command `git commit -s`. The iw-oss-publish auto-fix template for this check can apply the change automatically.
  references:
    - https://developercertificate.org/

OSS-CH-08:
  what_it_checks: |
    The repository carries a CODEOWNERS file that defines who owns and must review changes
    to specific paths or file extensions. The check verifies the file exists at one of the
    conventional locations used by GitHub's CODEOWNERS resolution order.
  how_it_tests: |
    The check calls ctx.exists with three candidate paths in priority order:
    .github/CODEOWNERS, docs/CODEOWNERS, and the root-level CODEOWNERS. The first match
    wins. If none are found, the check fails with severity SHOULD and auto_fix_available=True.
  risk_if_failing: |
    Changes to critical paths may land without review from the responsible team or
    maintainer, leading to broken integrations, unintended breaking changes, or security
    regressions that sit unreviewed for days. Contributors also lose a clear signal about
    who to request review from, creating back-and-forth delay.
  how_to_fix: |
    Create a CODEOWNERS file at .github/CODEOWNERS and populate it with path patterns
    and associated GitHub handles or team slugs. For example:
    /src/api/ @your-team
    *.yaml @infra-team
    The iw-oss-publish auto-fix template scaffolds a basic CODEOWNERS file automatically.
  references:
    - https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners

OSS-CH-09:
  what_it_checks: |
    The repository contains a pull request template that guides contributors on what
    information to include when opening a PR. The check searches for a file named
    PULL_REQUEST_TEMPLATE.md in .github/, at the repository root, or in docs/.
  how_it_tests: |
    The scan uses a file-existence check across three glob paths:
    .github/PULL_REQUEST_TEMPLATE.md, PULL_REQUEST_TEMPLATE.md, and
    docs/PULL_REQUEST_TEMPLATE.md. The first matching file satisfies the check.
    The file must be present and non-empty.
  risk_if_failing: |
    Contributors open PRs without context, missing description, or unclear scope.
    Reviewers spend extra time asking for missing information before they can assess
    the change. Inconsistent PR descriptions make it harder to generate a useful
    changelog or understand the intent of a change months later.
  how_to_fix: |
    Create .github/PULL_REQUEST_TEMPLATE.md with fields for summary, type of change,
    related issue, testing steps, and a sign-off checklist. Run `iw fix OSS-CH-09`
    to auto-apply the iw-oss-publish template.

OSS-CH-10:
  what_it_checks: |
    The repository has at least one GitHub issue template so that contributors
    can report bugs and request features in a structured format. Issue templates
    guide reporters toward providing the information maintainers need to act,
    which reduces back-and-forth and ensures triage-ready submissions.
  how_it_tests: |
    The check looks for a directory at `.github/ISSUE_TEMPLATE` and verifies
    it is non-empty. It does not inspect the content of the files, only that
    at least one file is present. A file matching `*.yml` or `*.yaml` inside
    that directory satisfies the check.
  risk_if_failing: |
    Contributors submit unstructured or incomplete issues, forcing
    maintainers to chase missing details before they can act. Feature requests
    and bug reports arrive without labels, steps to reproduce, or environment
    information, increasing triage effort and delaying resolution.
  how_to_fix: |
    Run `iw oss-fix --check OSS-CH-10` to render the standard bug report and
    feature request templates into `.github/ISSUE_TEMPLATE/`. Edit the rendered
    files to match the project's conventions before committing.

OSS-CH-11:
  what_it_checks: |
    The repository contains a SUPPORT.md file in the root, .github/, or docs/ directory.
    SUPPORT.md is a standard OSF community health file that tells users where to get help
    with the project. Its presence signals that the project maintainers have documented a
    clear support pathway and distinguishes a maintained project from abandoned code.
  how_it_tests: |
    The check calls ctx.exists with three candidate paths: SUPPORT.md (root),
    .github/SUPPORT.md, and docs/SUPPORT.md. The first match wins. The file only needs
    to exist; the check does not validate content. The iw-oss-publish auto-fix renders
    SUPPORT.md.j2 with the project's GitHub org, project name, and company contact email.
  risk_if_failing: |
    Users hit a dead end when they have questions or encounter problems, because there is
    no documented place to ask. Potential contributors may not know how to get help,
    increasing friction for incoming contributions. Downstream consumers may interpret a
    missing SUPPORT.md as a sign the project is unmaintained.
  how_to_fix: |
    Create SUPPORT.md at the root (or .github/ or docs/) with links to documentation,
    discussion forum, issue templates, and a commercial support contact.
    Run iw-oss-publish with the --fix flag to auto-apply the SUPPORT.md.j2 template
    populated with your project name, GitHub org, and contact email.

OSS-CH-12:
  what_it_checks: |
    The check verifies that a FUNDING.yml file exists in the .github directory of the repository.
    This file drives the sponsor button that GitHub displays on the repository main page.
    The check accepts either .github/FUNDING.yml or .github/funding.yml and carries severity MAY.
  how_it_tests: |
    The test uses ctx.exists to check for the presence of .github/FUNDING.yml or .github/funding.yml.
    It passes if the file is found and fails if neither path exists. The file is not parsed or validated.
  risk_if_failing: |
    The GitHub sponsor button renders without any funding targets, so potential financial
    contributors see no way to support the project. Sponsorship opportunities go invisible
    to anyone browsing the repository, which directly reduces incoming funding.
  how_to_fix: |
    Create a .github/FUNDING.yml file listing the desired funding platforms and usernames.
    The iw-oss-publish tool can render this file from its built-in template. Use the sponsor
    link syntax defined by GitHub, for example: github: USERNAME or patreon: USERNAME.
  references:
    - https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository

OSS-CI-01:
  what_it_checks: |
    The repository's GitHub Actions workflow files contain no plaintext secrets, API keys,
    tokens, passwords, or other credentials. Secret leakage in CI/CD workflows is a primary
    attack vector for supply chain compromise—workflow files are often cloned by contributors
    and CI systems, exposing any embedded credentials to all who have access.
  how_it_tests: |
    The check invokes the gitleaks CLI in detect mode against the `.github/workflows/`
    directory, running with `--no-git --source <workflows_dir> --report-format json --exit-code 0`.
    Gitleaks scans all workflow YAML files for patterns matching API tokens, private keys,
    generic secrets, and other credential formats. The tool outputs a JSON report; the
    check counts findings and registers a FAIL if any secrets are detected. The check SKIPs
    gracefully when `.github/workflows/` does not exist or when gitleaks is not installed.
  risk_if_failing: |
    Exposed secrets in workflow files allow attackers to authenticate as the repository's
    CI/CD identity. An attacker who steals a GitHub token from a workflow can push arbitrary
    code to the repository, publish releases, or exfiltrate artifacts. Even short-lived tokens
    are dangerous if the repository has significant permissions. Contributors who clone the
    repository also copy exposed secrets to their local machines, expanding the blast radius.
  how_to_fix: |
    Remove all credentials, tokens, and secrets from workflow YAML files. Store secrets in
    your CI/CD platform's secret manager (GitHub: Actions secrets / Environments; GitLab: CI/CD
    variables) and reference them via `${{ secrets.SECRET_NAME }}` in the workflow. Audit the
    git history of all workflow files using `git log --all --full-history -- <path>` to confirm
    no live secrets were previously committed. iw-oss-publish does not currently ship an
    auto-apply template for this check—manual remediation is required.
  references:
    - https://baseline.openssf.org/versions/2026-02-19.html#osps-br-07
OSS-CI-02:
  what_it_checks: |
    GitHub Actions in workflow files are pinned to full-length commit SHAs rather than mutable tags or branches.
    Floating references like `actions/checkout@v4` or `actions/checkout@main` can be updated by the action owner without any notification to your repository, introducing unexpected behavior or malicious code into your CI/CD pipeline.
  how_it_tests: |
    The check runs `pinact run --check` from the repository root with the working directory set to the target repository.
    pinact parses all `.github/workflows/*.yml` files, extracts every `uses:` entry that points to a GitHub Actions third-party action, and verifies each one references a 40-character hexadecimal SHA.
    Tags and branch references cause the check to fail.
  risk_if_failing: |
    An action owner can push a new commit to a tag or rename a branch, and your workflow picks up the change silently on the next run.
    A compromised action publisher can push malicious code under the same tag, and every downstream CI run executes that code with access to your secrets and `GITHUB_TOKEN`.
    OpenSSF Scorecard tracks this as a documented supply-chain risk; unpinned actions are one of the most common vectors for CI/CD supply-chain attacks.
  how_to_fix: |
    Replace every floating action reference with the equivalent pinned SHA.
    Run `pinact run` (without `--check`) in the repository root — it rewrites action refs to immutable SHAs in-place.
    Commit the updated workflow files.
  references:
    - https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
    - https://github.com/ossf/scorecard/blob/main/docs/checks/internal/permissions.md
OSS-CI-04:
  what_it_checks: |
    The repository does not track Terraform state files or variable files in git.
    State files (.tfstate, .tfstate.backup) contain sensitive infrastructure secrets such as
    cloud credentials and resource IDs. Variable files (terraform.tfvars) often hold plaintext
    secrets and environment-specific configuration.
  how_it_tests: |
    The check calls `git ls-files` against the repository working tree to enumerate all tracked files.
    It then filters the list for paths ending in `.tfstate`, `.tfstate.backup`, or `terraform.tfvars`.
    If any matches are found, the check fails and reports the offending paths.
  risk_if_failing: |
    Exposed Terraform state files let anyone with repository read access reconstruct the entire
    infrastructure topology, including cloud credentials and internal network addresses. State
    files may also contain connection strings, API keys, and secrets that were stored in-memory
    during the last `terraform apply`. An attacker who retrieves these files can move laterally
    across all environments defined in that state.
  how_to_fix: |
    Remove the files from git history and move them to a secure secret backend.
    For state files, migrate to a remote backend such as Terraform Cloud, S3 with locking, or
    GCS. For terraform.tfvars, store sensitive variable values in a secrets manager and reference
    them via environment variables or dynamic credentials in the CI pipeline.
    Add the patterns `*.tfstate`, `*.tfstate.backup`, and `terraform.tfvars` to `.gitignore` so
    they cannot be reintroduced. Run `git rm --cached` on any currently tracked files matching
    these patterns.
OSS-DEP-01:
  what_it_checks: |
    The check verifies that every dependency listed in the project's SPDX SBOM carries a license
    compatible with the project's declared outbound (outbound) license. It cross-references each
    package's license against a deny-list of copyleft licenses that are incompatible with
    permissive outbound licenses such as Apache-2.0 or MIT. If the SBOM is absent, the check
    skips entirely and the license compatibility gate is not enforced.
  how_it_tests: |
    The check reads the SPDX-formatted SBOM file written by syft at .iw_dir/sbom.spdx.json.
    For each package in the SBOM, it extracts license values from the licenseConcluded and
    licenseDeclared fields, parses SPDX license expressions (splitting on AND, OR, WITH, and
    parentheses), and checks each token against the deny-list for the configured outbound
    license. Any package with a denied license is flagged with its name and the specific
    offending license identifier. Findings are truncated to the first 20 flagged packages
    in the detail field and the first 50 in the evidence block.
  risk_if_failing: |
    The project ships dependencies whose licenses impose copyleft obligations or are
    fundamentally incompatible with the project's declared license. This creates legal
    exposure: a GPL-licensed dependency in an Apache-2.0 project can trigger GPL
    enforcement action, requiring the project to open its source code. Consumers of the
    project also inherit this compliance risk. Without a compliant SBOM, there is no
    inventory to prove due diligence during an audit.
  how_to_fix: |
    Review the flagged packages in the finding detail or the evidence/incompatible list.
    Replace each copyleft dependency with a version licensed under a permissive license
    compatible with the outbound license, or remove the dependency entirely if it is not
    needed. After making changes, regenerate the SBOM with syft and re-run the checks to
    confirm the incompatible licenses are gone. The iw-oss-publish fix toolchain does
    not auto-apply this fix — manual replacement or removal is required.

OSS-DEP-03:
  what_it_checks: |
    The check examines the project's software bill of materials (SBOM) for known security vulnerabilities
    at Critical severity. It runs Grype, a vulnerability scanner, against the SPDX-formatted SBOM
    generated earlier in the check chain. It then verifies that zero vulnerabilities with severity
    "Critical" are present in the dependency graph.
  how_it_tests: |
    The check requires a pre-existing SPDX SBOM file written to .iw_dir/sbom.spdx.json by the
    syft SBOM generator (OSS-DEP-05). It invokes grype sbom:.iw_dir/sbom.spdx.json -o json,
    parses the JSON output, and tallies matches by severity. If the Grype scan returns no data
    (tool missing or scan failed), the check skips. A MUST severity finding with status PASS
    fires when critical == 0; status FAIL fires when critical >= 1.
  risk_if_failing: |
    Critical vulnerabilities in dependencies are actively exploited in production environments.
    Attackers can gain remote code execution, steal secrets, or exfiltrate data without any
    user interaction. The project ships a vulnerable dependency to every consumer. The check
    prevents the release gate from passing until the Critical vulnerabilities are resolved.
  how_to_fix: |
    Identify the vulnerable dependency from the Grype JSON output or the detail field in the
    finding. Upgrade the dependency to a patched version, or replace it with a functionally
    equivalent alternative. Regenerate the SBOM and re-run the check to confirm the count
    reaches zero. The iw-oss-publish fix toolchain does not auto-apply this fix —
    manual triage and upgrade is required.

OSS-DEP-04:
  what_it_checks: |
    The project contains no high-severity vulnerabilities in its direct and transitive
    dependencies. Grype scans the SPDX SBOM to identify known vulnerabilities (CVEs)
    affecting the software supply chain.
  how_it_tests: |
    The check runs after OSS-DEP-05 generates an SPDX SBOM. It invokes `grype sbom:<spdx_path> -o json`
    and parses the JSON output, aggregating matches by severity label. A finding fails when
    the High severity count is greater than zero. The grype output is written to
    `.iw/grype-vulnerabilities.json` for auditability.
  risk_if_failing: |
    Known high-severity CVEs in dependencies are directly exploitable by attackers who
    target the vulnerable component. The project's deployed artifact inherits the
    vulnerability. Contributors who build from the failing state ship a compromised
    artifact. Maintaining a high vulnerability count also triggers false negatives in
    downstream security scans, slowing down release cycles.
  how_to_fix: |
    Update each affected dependency to a patched version, or replace it with a secure
    alternative. Run `syft scan dir:. -o spdx-json=.iw/sbom.spdx.json` to regenerate
    the SBOM after changes, then re-run the check to confirm the count drops to zero.
    If a vulnerability has no patched version and poses acceptable risk, document the
    decision in the project's security advisory record.

OSS-DEP-05:
  what_it_checks: |
    The project generates a Software Bill of Materials (SBOM) in both SPDX JSON and CycloneDX JSON formats.
    An SBOM is a structured inventory of every direct and transitive dependency, including names, versions, and licenses.
    Absence of an SBOM means the project has no machine-readable dependency baseline for license scanning or vulnerability intake.
  how_it_tests: |
    The check runs `syft scan dir:<target> -o spdx-json=<iw_dir>/sbom.spdx.json -o cyclonedx-json=<iw_dir>/sbom.cyclonedx.json -q`
    using the syft tool installed in the environment. It falls back to `syft <target>` for older syft versions. The check
    passes if both sbom.spdx.json and sbom.cyclonedx.json are created under the .iw/ directory.
  risk_if_failing: |
    Without an SBOM, license compatibility checks (OSS-DEP-01) and vulnerability scans (OSS-DEP-03/04) produce no results,
    leaving the project blind to copyleft license conflicts and known CVEs in its dependency tree. Downstream consumers
    performing their own supply-chain review will reject or flag the project for missing SBOM artifacts.
  how_to_fix: |
    Install syft and run the scan command manually, or trigger the auto-fix which invokes syft directly against the project
    source directory and writes both SBOM formats to the .iw/ directory. Automate the scan in CI so the SBOM stays current
    with every dependency change.

OSS-DEP-06:
  what_it_checks: |
    The repository root contains a machine-readable third-party license or notice file that discloses all open-source components and their licensing terms. This check accepts THIRD_PARTY_LICENSES.md, THIRD_PARTY_LICENSES, or THIRD-PARTY-NOTICES as valid filenames.
  how_it_tests: |
    The check calls ctx.exists with three filename candidates in preference order: THIRD_PARTY_LICENSES.md, THIRD_PARTY_LICENSES, and THIRD-PARTY-NOTICES. It tests whether any of these files exist in the repository root using Path.exists(). The status is PASS if one is found, FAIL if none exist.
  risk_if_failing: |
    Downstream users and legal teams cannot audit which open-source components the project ships or under what license terms, blocking adoption in enterprises with formal open-source compliance requirements. Auditors performing license due diligence will flag the project as non-compliant and may refuse to approve it. The absence of a consolidated notice forces contributors to manually track license obligations across every dependency.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` to regenerate the third-party license file from per-ecosystem license tools. If the project uses a different build system, use the appropriate license scanner for that ecosystem (such as npm licenses for Node.js, pip-licenses for Python, or cargo-license for Rust) and output the results to one of the accepted filenames in the repository root.
  references:
    - https://reuse.software/
    - https://spdx.github.io/spdx-spec/v2.3/

OSS-ENV-01:
  what_it_checks: |
    The target directory is a git repository with a working .git directory.
    The oss-publish tooling uses git for change tracking, branching strategy,
    commit history, and release tagging. A missing or incomplete .git directory
    breaks the entire versioning and publishing workflow.
  how_it_tests: |
    The check calls pathlib on the target path to resolve the absolute path,
    then checks for the existence of a .git subdirectory. It uses the Python
    pathlib library to test filesystem existence — no git commands are invoked.
    If .git exists, the check passes; otherwise it fails with severity MUST.
  risk_if_failing: |
    Without a valid git repository, the oss-publish tooling cannot record
    version history, manage releases, or construct correct version strings
    from commit tags. Contributors cannot branch, commit, or submit changes
    through the normal workflow. The CI/CD pipeline that depends on git metadata
    will fail at multiple points.
  how_to_fix: |
    Run `git init` in the target directory to initialize a new repository,
    or replace the target path with an existing clone of the repository.
    If .git exists but is corrupted, re-clone the repository rather than
    attempting repair.

OSS-ENV-02:
  what_it_checks: |
    The check verifies that all Tier-1 build and security tools are installed and executable
    on the PATH. Tier-1 tools are the core set required for the OSS publishing pipeline to
    function at all: gitleaks, git-filter-repo, ripgrep (rg), syft, grant, grype, osv-scanner,
    pinact, gh, and pre-commit. Without these, the pipeline cannot run secret scanning,
    license scanning, SBOM generation, vulnerability scanning, or PR automation.
  how_it_tests: |
    The check calls detect_tools() which uses shutil.which() to locate each Tier-1 binary
    by its canonical name (or binary alias for ripgrep and cargo-audit). It then calls
    missing_tier1() which filters the full tools dict against the TIER1 list and returns
    any tool whose resolved path is None. If the returned list is non-empty, the check
    fails with the missing tool names as evidence.
  risk_if_failing: |
    The pipeline aborts any step that depends on a missing tool. Gitleaks and grype not
    found means secret and vulnerability scanning silently drop from the build. Syft not
    found means SBOM generation fails, leaving the package without a software bill of
    materials. Gh not found means pull request automation cannot open issues or post
    comments. Contributors hit cryptic "command not found" errors mid-run with no
    diagnostic until the failing step.
  how_to_fix: |
    Run the install script at .claude/skills/iw-oss-publish/scripts/install_tools.sh.
    The script installs all Tier-1 and Tier-2 tools into the project virtual environment
    and places their shims on PATH. Re-run the check after installation to confirm all
    tools resolve.
  references:
    - https://iw-doc-plan.github.io/osps-baseline/environment.html

OSS-ENV-03:
  what_it_checks: |
    The check verifies that .iw/oss-publish.toml exists in the repository root. This file
    is the resolved configuration for the OSS publishing pipeline: it records the project
    name, license spdx identifier, copyright holder, export control settings, and which
    optional tools are disabled. Without it, the skill falls back to built-in defaults,
    and any custom per-project overrides are silently lost.
  how_it_tests: |
    The check tests whether the file .iw/oss-publish.toml exists at the repository root
    using a path existence check. The file must be readable as UTF-8. No schema validation
    is performed at this stage; a missing file is treated as a failure regardless of
    whether the file would be syntactically valid if present.
  risk_if_failing: |
    The pipeline uses default values for all configuration options. Any project-specific
    choices — such as a non-standard license, a custom copyright holder name, or a tool
    that must be disabled — are silently discarded. This can cause the published package
    to carry the wrong license identifier, miss required NOTICE entries, or fail export
    control review if the project uses cryptography. Contributors have no machine-readable
    record of what the correct configuration is.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` to generate .iw/oss-publish.toml from the skill template.
    The command prompts for project_description if it is not already set, then writes the
    resolved config. Edit the file afterwards if you need to override any default values
    for your project.
OSS-ENV-04:
  what_it_checks: |
    The check verifies that `.iw/` is listed in the project's `.gitignore` file.
    The `.iw/` directory stores agent state, skill configurations, and tooling
    data that are local to each worktree and should never be committed to version
    control.
  how_it_tests: |
    The check reads the `.gitignore` file at the repository root, splits it into
    lines, and strips trailing slashes from each entry. It then searches for an
    exact match of the string `.iw`. If a matching entry exists, the check passes;
    otherwise it fails. The check is severity MAY, meaning it flags the omission
    but does not block publication.
  risk_if_failing: |
    Without `.iw/` in `.gitignore`, contributors may accidentally commit internal
    agent state, skill data, and per-worktree configuration into the shared repository.
    This exposes tooling internals to all project members and creates noise in the
    git history that is difficult to remove once pushed. In shared or open-source
    repositories this also means external contributors inherit unnecessary agent
    state files.
  how_to_fix: |
    Add the line `.iw/` to the `.gitignore` file at the repository root. Place it
    alongside other dotfile ignore patterns. If the project uses `iw-oss-publish`,
    run the auto-fix to append this entry automatically.
  references:
    - https://git-scm.com/docs/gitignore

OSS-EXP-01:
  what_it_checks: |
    The check scans source files for imports of cryptographic libraries across Python, Node.js, Go, and Rust ecosystems. It detects both standard-library-wrapped crypto and non-standard crypto implementations. The goal is to determine whether the project uses cryptography that may trigger export control obligations under the Export Administration Regulations (EAR) before the project is published.
  how_it_tests: |
    The check runs ripgrep across the target repository using language-specific regex patterns. For Python it searches `import cryptography`, `from cryptography`, `import nacl`, `import Crypto`, and `import pycryptodome`. For Node it searches `require('crypto')`, `from 'node-forge'`, `from 'sjcl'`, and `from 'tweetnacl'`. For Go it searches `crypto/[a-z]+`. For Rust it searches `ring::`, `rustls::`, `aes::`, and `chacha20::`. If no hits are found the check passes. If hits are found and `export_control.standard_crypto_only = true` is set in `.iw/oss-publish.toml` the check also passes. Otherwise it flags the finding as HUMAN_REQUIRED.
  risk_if_failing: |
    The project ships cryptography without determining whether it qualifies as non-standard crypto under EAR. Non-standard crypto implementations may require BIS or NSA notification before international distribution. Projects that skip this classification risk government enforcement, injunctions, or take-down orders in regulated markets. Downstream consumers in aerospace, defense, or government supply chains will fail their own compliance audits if the classification is absent.
  how_to_fix: |
    If all detected cryptography comes from established standard libraries, add `export_control.standard_crypto_only = true` to `.iw/oss-publish.toml`. If the project implements non-standard cryptography, consult legal counsel on the BIS and NSA notification process before publishing. The iw-oss-publish tool does not auto-apply this flag — it requires human attestation after legal review.
  references:
    - https://baseline.openssf.org/versions/2025-02-25
    - https://www.bis.doc.gov/index.php/policy-guidance/encryption-and-export-management-after-2021-tsu-exemption

OSS-EXP-02:
  what_it_checks: |
    The check fires only when a project uses non-standard cryptography. It verifies that the publisher has explicitly confirmed BIS or NSA notification by setting the `export_control.non_standard_crypto_notified` config flag to `true` in `.iw/oss-publish.toml`. If non-standard crypto is present and this flag is absent or set to `false`, the check fails.
  how_it_tests: |
    The check reads the `.iw/oss-publish.toml` file in the target repository and inspects the boolean value of `export_control.non_standard_crypto_notified`. It only produces a finding when the value is `False` or absent. No file globs, regex sweeps, or API calls are involved — this is a pure config flag check.
  risk_if_failing: |
    The project ships non-standard cryptography without government notification. This violates the Export Administration Regulations (EAR) and can trigger BIS or NSA enforcement, including loss of export privileges, injunctions, or mandatory take-down orders in regulated markets. Downstream users in aerospace, defense, or government supply chains will fail their own compliance audits.
  how_to_fix: |
    Complete the required BIS or NSA notification process for the non-standard crypto, then set `export_control.non_standard_crypto_notified = true` in your `.iw/oss-publish.toml`. Alternatively, replace the non-standard crypto implementation with a standard library to eliminate the notification requirement entirely. The iw-oss-publish tool does not auto-apply this flag — it requires human attestation after legal review.

OSS-GH-01:
  what_it_checks: |
    The repository has branch protection enabled on the main branch that blocks direct pushes.
    Without this protection, anyone with write access can push commits directly to main,
    bypassing review and polluting the canonical history with unreviewed changes.
  how_it_tests: |
    The check calls the GitHub API endpoint `GET /repos/{owner}/{repo}/branches/main/protection`
    using the `gh` CLI. It reads the `allow_force_pushes` and `required_pull_request_reviews`
    fields. The check passes if either force pushes are disabled or a PR review requirement
    is enforced. If the API call fails (private repo, insufficient permissions, or protection
    not configured), the check is skipped.
  risk_if_failing: |
    Unreviewed code lands directly on main. Security incidents become irreversible without
    a history rewrite. Audit trails lose fidelity because every commit lacks a PR-reviewed
    association. Contributors cannot distinguish verified releases from ad-hoc patches.
  how_to_fix: |
    In the repository Settings > Branches > Branch protection rules, add a rule for `main`
    that enables "Require a pull request before merging" and blocks force pushes. If the
    repository uses GitHub Teams, restrict the rule to the maintainers team. There is no
    auto-apply template for this check.
  references:
    - https://baseline.openssf.org/versions/2025-02-25

OSS-GH-02:
  what_it_checks: |
    The repository allows deletion of the primary branch. OSS-GH-02 verifies that branch protection on the default branch blocks branch deletion, requiring explicit user intent before the VCS will delete the primary branch. For private repositories the severity is SHOULD; for public repositories it is MUST.
  how_it_tests: |
    The check calls `gh api repos/{owner}/{repo}/branches/{branch}/protection` for the default branch and reads the `allow_deletions` field. A PASS result means `allow_deletions` is false; a FAIL means it is true or the protection object is absent. The check requires the `gh` CLI, a valid git remote, and authentication.
  risk_if_failing: |
    If branch deletion is enabled, any contributor with admin rights can permanently destroy the primary branch history with a single API call or UI action. This breaks all open pull requests, obliterates CI references, and removes the canonical source of truth. Recovery requires restoring from a local clone or a user fork, which may not exist for contributors who only worked through the web UI.
  how_to_fix: |
    In the repository Settings > Branches, enable "Protect main branch" and check "Restrict deletion". Alternatively, run `gh api -X DELETE repos/{owner}/{repo}/branches/{branch}/protection` to strip deletion permission, then re-apply push protection. There is no auto-apply template for this check; the fix requires manual GitHub UI interaction or an authenticated API call with admin privileges.
  references:
    - https://baseline.openssf.org/versions/2025-02-25#osps-ac-0302
OSS-GH-08:
  what_it_checks: |
    The GitHub repository has a non-empty description field. This is the short summary
    that appears under the repo name on github.com, in search results, and in API responses.
  how_it_tests: |
    The check calls `gh repo view --json description` against the live GitHub API and trims
    whitespace from the value. The check passes if the resulting string is non-empty and
    contains at least one non-whitespace character.
  risk_if_failing: |
    The repository appears with a blank or placeholder description in GitHub search, PR
    templates, and issue trackers. Contributors and potential users cannot quickly assess
    the project's purpose. Onboarding friction increases and the project is harder to
    discover.
  how_to_fix: |
    Set a description with `gh repo edit --description "A short summary of what this project does"`.
    The iw-oss-publish publish playbook emits this command automatically when the repo description
    is absent.

OSS-GH-09:
  what_it_checks: |
    The repository has at least three GitHub topic labels assigned. Topics improve discoverability through GitHub search and the Explore feed. Projects with zero or few topics are harder for potential contributors and users to find.
  how_it_tests: |
    The check calls `gh repo view --json topics` and counts the items in the returned list. The finding fails when fewer than three topics are present.
  risk_if_failing: |
    Contributors and users cannot discover the repository through GitHub topic browsing or search. The project appears unmaintained or incomplete, which reduces uptake and community growth. An unlabeled repository also blends into noise on busy GitHub explore pages.
  how_to_fix: |
    Assign at least three descriptive topics via the repository Settings page on GitHub, or run `gh repo edit --add-topic "topic-name"` for each topic. The iw-oss-publish publish playbook can apply this automatically if the topics list is supplied in the project configuration.
OSS-GH-10:
  what_it_checks: |
    The check verifies that the repository has an external homepage URL set in its GitHub metadata. GitHub displays this URL alongside the repository description and topics on the repo landing page. Without it, visitors have no clickable link to the project's primary documentation, website, or package registry from the GitHub UI.
  how_it_tests: |
    The check runs `gh repo view --json homepageUrl` against the repository remote and asserts the returned `homepageUrl` field is a non-empty string. The test skips if the `gh` CLI is unavailable, the repo has no remote, or the `gh repo view` call fails (e.g., not authenticated).
  risk_if_failing: |
    Contributors and users arriving at the GitHub repo see the description and topics but have no direct path to the project website or hosted documentation. This forces manual searching for the main project page and creates friction in the adoption funnel. Security researchers or package managers looking for the canonical source of truth also lose a critical signal.
  how_to_fix: |
    Set the homepage URL with `gh repo edit --homepage https://your-project-url.example.com`. Use the project's main documentation site, the package registry URL for published artifacts, or the primary website. The iw-oss-publish playbook template emits this edit command when the field is absent.

OSS-GH-11:
  what_it_checks: |
    The repository allows squash merging on pull requests. Squash merging condenses
    all commits in a PR into a single commit on the target branch, keeping the project
    history linear and easier to bisect. This setting is checked via the GitHub API.
  how_it_tests: |
    The check calls `gh repo view --json squashMergeAllowed` to retrieve the current
    repository merge options. It passes if the value is true, fails if it is false
    or missing. No file globs or regex are involved; the check reads directly from
    the GitHub API response field `squashMergeAllowed`.
  risk_if_failing: |
    When squash merge is disabled, contributors must merge full commit histories into
    main. This creates non-linear history with merge commits that complicate `git bisect`,
    inflate the commit graph, and make it harder to identify which change introduced
    a regression. It also increases the chance that CI artifacts from topic branches
    get baked into the main history.
  how_to_fix: |
    Enable squash merging in the repository settings under "General" → "Merge types",
    or via the CLI: `gh repo edit --squash`. The iw-oss-publish publish playbook
    includes an auto-apply step that sets this option when onboarding a new repository.
  references:
    - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-branches-in-your-repository/managing-the-default-branch-type
OSS-GH-12:
  what_it_checks: |
    Whether the GitHub repository allows regular merge commits (as opposed to squash-merge or rebase-merge only).
    Merge commits create a synthetic commit in the main branch that ties together all the commits from a feature branch,
    which clutters the history and makes it harder to follow the logical flow of changes.
  how_it_tests: |
    The check calls the GitHub CLI `gh repo view --json mergeCommitAllowed` and reads the `mergeCommitAllowed` field.
    A PASS result occurs when this field is `false`, meaning merge commits are disabled and only squash or rebase merges are permitted.
    A FAIL result occurs when the field is `true`, meaning standard merge commits are still accepted.
  risk_if_failing: |
    When merge commits are enabled, every merged PR creates a merge commit in the main branch history.
    This makes `git log` noisy and makes it difficult to trace a bug or feature to a specific commit.
    It also makes it harder to revert a feature cleanly because revert commits do not cleanly cancel the original commits.
    Contributors who prefer a linear history must work around merge commits manually.
  how_to_fix: |
    In the GitHub repository settings under "Pull Requests", disable "Allow merge commits".
    This forces all merges to use either squash-merge or rebase-merge, producing a clean linear history.
    Alternatively, the `iw-oss-publish` auto-fix template `gh-enforce-squash-only` can apply this setting programmatically.
  references:
    - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-branches-in-your-repository/managing-the-default-branch-value

OSS-GH-13:
  what_it_checks: |
    The check verifies that the GitHub repository has deleteBranchOnMerge enabled.
    This setting controls whether GitHub automatically deletes the head branch
    when a pull request is merged. The check applies to all repositories regardless
    of public/private status.
  how_it_tests: |
    The check calls `gh repo view --json deleteBranchOnMerge` against the repository
    remote. It parses the boolean value of the deleteBranchOnMerge field. The test
    requires the `gh` CLI to be installed and authenticated.
  risk_if_failing: |
    When this setting is disabled, merged pull request branches accumulate in the
    repository. Stale branches create noise in code review UI, consume namespace,
    and increase the operational burden on maintainers who must identify and remove
    them manually. Inactive branches can also cause confusion during incident response
    when contributors reference outdated branch names.
  how_to_fix: |
    Enable "Delete head branches" in the repository settings under the General section.
    Alternatively, run the iw-oss-publish publish playbook, which includes an auto-apply
    step that sets deleteBranchOnMerge to true via the GitHub API.
  references:
    - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-branches-in-your-repository/managing-the-default-branch-and-branch-protection#managing-the-deletion-of-head-branches

OSS-GH-14:
  what_it_checks: |
    The repository has published at least one GitHub Release. GitHub Releases give end users a stable, versioned artifact to download without needing to understand git history or build from source. They also unlock GitHub-native tooling that depends on release objects.
  how_it_tests: |
    Runs `gh release list --limit 1 --json tagName,isLatest` in the repo root. If the command returns a non-empty list the check passes; an empty list or a non-zero exit code causes a FAIL.
  risk_if_failing: |
    Contributors and consumers must manually locate and build from git tags, which is error-prone and excludes non-technical users. Release-based automation such as Dependabot vulnerability tracking, release-please, SBOM generation, and third-party integrations that anchor on release objects will not function.
  how_to_fix: |
    Publish a release using `gh release create <tag> --title "<version>"`. For recurring automated releases, set up release-please which iw-oss-publish can configure via the OSS-REL-03 fix recipe.
  references:
    - https://docs.github.com/en/repositories/releasing-projects-on-github/about-releases

OSS-GH-ALL:
  what_it_checks: |
    This is not a single check but a family of GitHub repository live-settings checks that run
    via the gh CLI. The check passes when the gh CLI is available, the repository has a remote
    pointing to GitHub, authentication is configured, and all sub-checks pass. If any
    prerequisite fails, the Finding is emitted with status SKIP and carries no osps_control.
  how_it_tests: |
    The check first verifies three conditions before running any sub-checks: gh CLI is
    installed (checks PATH for the gh binary), the target repository has a git remote, and
    `gh repo view --json` returns valid JSON. If all prerequisites pass, it runs sub-checks
    that query gh API endpoints for repository metadata, branch protection settings, and
    release data. Sub-checks include: non-empty description (OSS-GH-08), at least 3 topics
    (OSS-GH-09), homepage URL set (OSS-GH-10), squash-merge enabled (OSS-GH-11),
    merge-commit disabled (OSS-GH-12), delete-branch-on-merge enabled (OSS-GH-13),
    at least 1 release (OSS-GH-14), main branch blocks direct pushes (OSS-GH-01), and
    main branch deletion disabled (OSS-GH-02).
  risk_if_failing: |
    If gh CLI is unavailable or unauthenticated, no GitHub live-settings validation runs —
    broken branch protection, missing descriptions, disabled delete-branch-on-merge, and
    other repository misconfigurations go undetected. Contributors cannot discover the
    project via topics or homepage URL. Squash-merge disabled forces merge commits into
    main history, complicating bisect and revert. Merge-commit enabled allows potentially
    messy non-linear history. No releases means package managers and integrators lack
    stable version anchors.
  how_to_fix: |
    Install the gh CLI and authenticate with `gh auth login`. Ensure the repository has a
    git remote pointing to GitHub. Fix individual sub-check failures with `gh repo edit`
    commands or the GitHub web interface. For branch protection settings, go to
    Settings > Branches in the GitHub repository. For auto-apply of all GitHub settings,
    run the iw-oss-publish playbook which calls `gh repo edit` for the applicable fields.
  references:
    - https://cli.github.com/
    - https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features

OSS-GOV-01:
  what_it_checks: |
    The repository contains a GOVERNANCE.md file that documents decision-making
    processes, merge authority, and the Code of Conduct escalation chain. The check
    only escalates to a failure when the project has 4 or more maintainers listed in
    CODEOWNERS, or when the project config sets governance.foundation_stewardship to true.
    Projects with fewer maintainers and no foundation stewardship flag receive an
    informational result instead.
  how_it_tests: |
    The check looks for a file named GOVERNANCE.md at the root of the repository or
    under the docs/ directory. It also parses .github/CODEOWNERS (or docs/CODEOWNERS)
    to count unique @-mentioned maintainer handles. If the file exists and either
    condition is met, the check passes. If the file is absent and the project has 4+
    maintainers or sets the foundation_stewardship flag, the check fails. Otherwise
    it returns an informational MAY result.
  risk_if_failing: |
    Without a GOVERNANCE.md, contributors have no documented path to understand who
    makes decisions, which branches require approval, or how to escalate a conflict.
    Power struggles over merge authority become likely. Security incidents and CoC
    violations have no clear owner, delaying response and exposing downstream users
    to unresolved harm. Enterprise adopters performing vendor due diligence will flag
    the absence as a compliance gap.
  how_to_fix: |
    Create a GOVERNANCE.md file at the repository root (or docs/GOVERNANCE.md) that
    describes the decision-making model, lists who holds merge authority on each branch,
    and specifies the escalation path for Code of Conduct violations. Align the document
    with the OpenSSF Best Practices badge criteria. iw-oss-publish does not provide an
    auto-apply template for this check; you must draft and commit the file manually.
OSS-GOV-02:
  what_it_checks: |
    The check verifies that a MAINTAINERS file is present in the repository root, as MAINTAINERS.md, or under docs/. The file documents who maintains the project and how to reach them. This is the primary channel for external contributors to identify and contact the people responsible for the codebase.
  how_it_tests: |
    The check calls ctx.exists() with three candidate paths in order: MAINTAINERS (root), MAINTAINERS.md (root), and docs/MAINTAINERS.md. If any path resolves to an existing file, the check passes. There is no osps_control mapping and no auto-fix template for this check.
  risk_if_failing: |
    Without a MAINTAINERS file, external contributors have no dedicated place to discover who owns or maintains the project. COMMUNITY.md or CODEOWNERS can partially fill this role, but they require contributors to know to look there. This creates contributor friction and can slow or block external engagement.
  how_to_fix: |
    Create a MAINTAINERS file at the root of the repository listing the current maintainers, their GitHub handles, and optionally their areas of responsibility or contact information. Place it as MAINTAINERS, MAINTAINERS.md, or docs/MAINTAINERS.md. The check has no auto-fix script; create the file manually.
  references: []

OSS-HIST-01:
  what_it_checks: |
    The project records a non-empty history strategy under the `history.strategy` key in
    the publish config. This strategy defines how the project handles sensitive content
    (internal URLs, personal email addresses, credentials, or proprietary references)
    that may exist in the git history when preparing to publish.
  how_it_tests: |
    The check reads the publish configuration file and retrieves the value of the
    `history.strategy` key. If the key is absent or set to an empty value, the check
    fails with HUMAN_REQUIRED status in publish mode and INFO status in scan mode.
  risk_if_failing: |
    Without a recorded strategy, the publish process has no defined path for handling
    sensitive history content. Contributors proceed without guidance and may inadvertently
    push internal URLs, personal email addresses, or embedded secrets to a public
    repository. If a rewrite is needed later, the cost and risk of an interactive rebase
    grows with every passing commit.
  how_to_fix: |
    Set `history.strategy` in your publish config to one of the documented options:
    "clean" (remove sensitive data before publish), "rewrite" (interactive rebase),
    or "preserve" (keep history intact with disclosure). The iw-oss-publish tool
    prompts for this decision when running in `publish` mode and records the choice
    automatically.
OSS-HIST-03:
  what_it_checks: |
    The check scans the full git history of the repository for author email addresses that do not use the GitHub noreply format (username@users.noreply.github.com). Personal email addresses in the commit history become visible to anyone who clones the repository or views the commit log on a hosting platform.
  how_it_tests: |
    The check runs `git log --all --format=%ae` against the target repository, enumerates every unique author email, and flags any address that does not end with `@users.noreply.github.com`. The first 10 flagged addresses appear in the finding detail; the full list is stored in the evidence payload.
  risk_if_failing: |
    When the project goes public, every personal email address in the history is exposed to the internet. This creates a privacy violation that can conflict with GDPR Article 5(1)(c) data minimization requirements. Downstream consumers who copy the history inherit those addresses, so the exposure persists even after the repository is archived or mirrored.
  how_to_fix: |
    Identify each contributor whose email was flagged and decide whether to seek their consent to keep the address, rewrite the history to replace the address with the noreply form, or remove their commits if they cannot be reached. For future commits, configure git to use the noreply address with `git config user.email ID+username@users.noreply.github.com`. The history rewrite process is documented in history_rewrite.md.
OSS-HIST-04:
  what_it_checks: |
    Whether any git submodules registered in .gitmodules reference internal URLs
    instead of public mirrors. The check uses two config keys — internal_fqdn_suffixes
    and internal_email_domains — to determine what counts as internal.
  how_it_tests: |
    The test reads the .gitmodules file in the target repository, extracts every
    line starting with "url =", and checks each URL substring against the configured
    internal suffixes and email domains. Any submodule URL matching one of those
    patterns causes the check to fail. Submodules that already point to public
    mirrors pass.
  risk_if_failing: |
    Publishing a repository with internal submodule URLs leaks internal infrastructure
    hostnames and network topology into public artifacts. Downstream consumers
    cannot clone the submodules when internal services are unreachable, breaking
    reproducible builds. It also creates a compliance gap for organizations that
    must exclude internal references from published code.
  how_to_fix: |
    Remove internal submodules from .gitmodules before publishing, or replace their
    URLs with public mirror equivalents. For new submodules, configure git to use
    the public URL form by default. After making changes, run the check again to
    confirm a clean result.
OSS-HYG-01:
  what_it_checks: |
    The repository .gitignore contains the minimum required patterns to prevent accidental
    commits of secret material. Specifically it checks for .env, *.pem, *.key, *.pfx, and *.p12.
    These are the file patterns most likely to expose credentials, private keys, or certificates
    if accidentally committed to a public or shared repository.
  how_it_tests: |
    The check reads the .gitignore file from the repository root, splits it on newlines, and
    strips comments and whitespace. It then compares the resulting set of patterns against the
    required list: .env, *.pem, *.key, *.pfx, and *.p12. Any pattern from that list that is
    absent from .gitignore causes a failure. The check does not inspect git history or tracked files.
  risk_if_failing: |
    A .gitignore missing these patterns allows secret files to enter the git history. Private keys
    (.pem, .key, .pfx, .p12) committed to a repository remain in the object graph indefinitely even
    after removal. Environment files (.env) often contain database passwords, API keys, or service
    credentials that become immediately accessible to anyone with repository read access. This creates
    both security exposure and incident response burden.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` which uses the iw-oss-publish auto-fix template to append the missing patterns
    to .gitignore. Alternatively, edit .gitignore directly and add each missing pattern on its own
    line: .env, *.pem, *.key, *.pfx, *.p12. Commit the change to the default branch.
  references:
    - https://docs.github.com/en/get-started/getting-started-with-git/ignoring-files
    - https:// OWASP.org/community/www-project-api-security/asvs/latest/doc/4.0/0x10-app-security-best-practices/

OSS-HYG-02:
  what_it_checks: |
    That a project does not have sensitive files tracked in git. The check examines every file that git knows about and flags credentials, private keys, certificate bundles, Terraform state files, and common per-environment .env files that contain secrets. Template files such as .env.example are allowlisted and do not cause a failure.
  how_it_tests: |
    The check calls ctx.tracked_files() to retrieve the complete list of files known to git. For each file it extracts the basename and performs three tests: (1) skip if the basename is in the safe allowlist (.env.example, .env.sample, .env.template, .env.dist, .env.defaults), (2) fail if the basename matches a known sensitive pattern such as .env, .env.local, .env.production, .env.staging, .env.test, (3) fail if the full path or basename matches one of the sensitive globs (*.pem, *.key, *.pfx, *.p12, *.tfstate, *.tfstate.backup, terraform.tfvars). Violations are capped at 50 entries in evidence.
  risk_if_failing: |
    Private keys, secrets, and credentials end up in git history. Anyone with read access to the repository or a copy of the history can extract those secrets. If the repository is public or gets leaked, attackers can use the exposed credentials to access production systems, cloud environments, or third-party services. Remediation requires rewriting git history, which is time-consuming and error-prone.
  how_to_fix: |
    Remove each flagged file from git history using git-filter-repo or the BFG Repo-Cleaner. After removal, add the file paths or patterns to .gitignore so they are never tracked again. Run `uv run iw oss fix <CHECK_ID> --apply` to automatically append the recommended .gitignore patterns for secret file extensions. Verify with a fresh clone that the sensitive content no longer appears in the history.

OSS-HYG-03:
  what_it_checks: |
    The check verifies that the .gitignore file at the repository root contains entry patterns for each detected ecosystem so that build artifacts, dependency caches, and intermediate files do not end up in version control.
  how_it_tests: |
    The check reads .gitignore from the target repository, parses all non-comment, non-blank lines into a set, then iterates over the detected language ecosystems (Python, Node, Go, Rust, Java). For each ecosystem it compares known language-specific patterns (e.g., __pycache__/, node_modules/, target/, .venv/) against the .gitignore set. Any missing pattern is flagged as a failure.
  risk_if_failing: |
    Untracked build artifacts and dependency caches consume storage and inflate repository size. node_modules or __pycache__ directories committed accidentally pollute git history and make clones slower. In monorepos this noise also makes it harder for contributors to spot real source files in diffs.
  how_to_fix: |
    Add the missing ecosystem patterns to the .gitignore file. The iw-oss-publish fix tool can append the correct patterns for the detected ecosystems automatically; run it with the --auto-fix flag or regenerate the .gitignore via the tool.
  references:
    - https://github.com/github/gitignore — community .gitignore templates indexed by language
OSS-HYG-04:
  what_it_checks: |
    The check verifies that no blob exceeding 50 MB exists anywhere in the repository's git history.
    Large blobs in history bloat the clone size and slow down CI pipelines even when the files
    have been deleted from the working tree.
  how_it_tests: |
    The check runs `git rev-list --objects --all` to enumerate all objects reachable from any ref,
    then pipes the SHA list through `git cat-file --batch-check=%(objecttype) %(objectsize) %(objectname)`
    to retrieve the size of each blob. Any blob with size greater than 50 MB is flagged.
    The top 5 offenders are listed in the detail field and the top 20 are stored in evidence.
  risk_if_failing: |
    A repository with large blobs in history forces every `git clone` and CI job to download
    those objects, even if the files are no longer present. This increases network costs and
    causes timeouts on CI runners with shallow fetch limits. Contributors may be unable to
    push corrected commits if their local history is corrupted.
  how_to_fix: |
    Migrate large binary assets to Git LFS before rewriting history. Then run `git-filter-repo`
    --rewrite-blobs --replace-text to purge oversized objects from local and remote history.
    Finally push with `--force` to update the default branch. The check sets auto_fix_available=True
    to signal that a remediation template exists in iw-oss-publish for this case.

OSS-HYG-05:
  what_it_checks: |
    The check verifies that no tracked files exceeding 10 MB exist in the git working tree without Git LFS registration. It scans the filesystem directly for each file that git tracks and flags any regular file above the size threshold. The goal is to catch large assets before they enter git history, where they bloat the repository for every clone.
  how_it_tests: |
    The check iterates over every entry returned by git ls-files for the repository. For each relative path it encounters, it resolves the file on disk, checks that it is a regular file, and compares its size in bytes against the 10 MB threshold (10 * 1024 * 1024 bytes). Files that exceed this size and are not git LFS-tracked cause the check to fail. The first 20 matching file paths are recorded as evidence.
  risk_if_failing: |
    Large binary files committed to git history cannot be removed without a history rewrite, making every clone slower and CI cache larger indefinitely. Binary blobs cause noisy diffs, inflate backup sizes, and trigger OOM conditions in git operations on memory-constrained CI runners. Contributors pulling the repository pay the storage and network cost for files that should have been streamed via LFS.
  how_to_fix: |
    Identify the large file and remove it from git tracking with git rm --cached <path>, then add the file to .gitattributes with a LFS filter rule such as *.zip filter=lfs diff=lfs merge=lfs -f. Re-add the file so git LFS manages the pointer. If the file should not be in the repository at all, delete it entirely. The iw-oss-publish hygiene template provides an automated scaffolding that sets up .gitattributes LFS rules and a pre-commit hook to prevent future large-file commits.

OSS-HYG-06:
  what_it_checks: |
    The default branch of the repository is named 'main'. GitHub's community health analytics
    and many automated tooling assume the default branch is called 'main'. A repository whose
    default branch carries a different name creates confusion for contributors, breaks CI templates
    that reference `main`, and may cause automated security scanners to miss the primary branch.
  how_it_tests: |
    The check calls `git branch` (or reads `HEAD` directly) to determine the current branch name
    of the repository at the revision being evaluated. If the repo is in a detached-HEAD state
    the check passes, because there is no default branch to evaluate. Otherwise it fails when
    the branch name is neither `main` nor the empty string.
  risk_if_failing: |
    Contributors who clone the repo and follow standard scripts that reference `origin/main` will
    find no such ref and must manually adjust. Automated security scanners that hard-code
    `main` as the target branch will not scan the actual default branch, creating a coverage gap.
    GitHub's "Insights > Community" section will flag the repo as not following the `main`
    convention, reducing its health score and causing downstream reporting to show false negatives.
  how_to_fix: |
    Rename the default branch to `main` in GitHub's repo settings, then update any CI pipeline
    references to the old branch name. If the repository uses a branch protection policy that
    requires the old branch name as an exception, update that policy to reference `main`
    before public release.
  references:
    - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-branches-in-your-repository/renaming-a-branch
OSS-LIC-01:
  what_it_checks: |
    The repository root contains a license file named LICENSE, LICENSE.md, LICENSE.txt, COPYING, or COPYING.md.
    Many package registries, code hosts, and legal tools require this file to be present before they can
    approve publication or consumption of the artifact.
  how_it_tests: |
    The check calls ctx.exists with the full candidate list and accepts the first path that is found.
    It does not open or parse the file — only confirm existence.
  risk_if_failing: |
    Automated publishing workflows reject the artifact outright. Security scanners and license scanners
    that integrate with build pipelines report a missing license and may block deployments.
    Contributors who clone the repo see no indication of the terms under which they may use the code.
  how_to_fix: |
    Place a file named LICENSE at the repository root with the full license text.
    If the project uses iw-oss-publish, run `uv run iw oss fix <CHECK_ID> --apply` to scaffold the correct file from the project's
    declared license and company legal name — the tool will create or overwrite LICENSE with the
    appropriate template.

OSS-LIC-02:
  what_it_checks: |
    The check verifies that the license declared in the project configuration is one of the licenses approved by the Open Source Initiative (OSI). It compares the configured license identifier against a hard-coded allowlist of OSI-approved licenses.
  how_it_tests: |
    The check reads the `license` value from the project configuration (defaults to `Apache-2.0`). It then checks whether that value exists as a key in the `OSI_APPROVED` set defined in the check module. The set contains 18 license identifiers including Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, MPL-2.0, LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later, GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, EPL-2.0, CDDL-1.0, and Unlicense. No file scanning is involved; the check relies entirely on the configuration value.
  risk_if_failing: |
    The project ships with a non-OSI-approved license. This blocks participation in some open source ecosystems, causes compliance tooling to flag the project as non-compliant, and may deter contributors who expect OSI-approved terms. Some procurement and legal review workflows will reject or stall on non-OSI-approved licenses.
  how_to_fix: |
    Change `license` in the project configuration to an OSI-approved identifier that matches the actual license text in the LICENSE file. If the project uses a non-standard license, either replace it with an OSI-approved equivalent or engage legal counsel to assess the implications before publication.

OSS-LIC-03:
  what_it_checks: |
    The SPDX identifier embedded in the LICENSE file text matches the license declaration
    stored in the project configuration. Projects declare their license in config (for example
    "Apache-2.0" or "MIT") and ship a LICENSE file. OSS-LIC-03 verifies that the actual text
    in the LICENSE file is consistent with that declaration.
  how_it_tests: |
    The check reads the LICENSE file and runs a heuristic SPDX detector against the body text.
    The detector looks for tell-tale phrases such as "Apache License Version 2.0",
    "MIT License", "ISC License", "GNU General Public License", or "BSD 3-Clause" to
    infer the identifier embedded in the file. It then compares the detected identifier
    against the license string stored in the project config. If the text cannot be matched
    to any known SPDX identifier, the check returns HUMAN_REQUIRED. If a match is found
    but differs from the config declaration, it returns FAIL.
  risk_if_failing: |
    A mismatch means the project ships a LICENSE file that contradicts the declared license.
    Downstream consumers who rely on the config value will make incorrect licensing decisions.
    Legal and compliance teams performing an audit will surface a discrepancy that requires
    manual reconciliation before the project can be cleared. In extreme cases, the LICENSE
    file text may grant broader or narrower permissions than the project intends, creating
    legal exposure.
  how_to_fix: |
    Reconcile the mismatch by either replacing the LICENSE file with a verbatim copy of the
    declared license from the SPDX list, or updating the config license value to match what
    the file actually contains. Run `uv run iw oss fix <CHECK_ID> --apply` which can regenerate a correct
    LICENSE file from the declared identifier. After fixing, re-run the check to confirm PASS.
  references:
    - https://spdx.github.io/spdx-spec/v2.3/
    - https://osskb.org/reference/OSPS-LE-02.01
OSS-LIC-04:
  what_it_checks: |
    The LICENSE file contains a copyright line that includes the company's legal name.
    Projects published by Innovation Ways must assert copyright ownership in their
    license file to avoid ambiguity about who controls the distribution terms.
  how_it_tests: |
    The check reads the LICENSE file (or COPYING) and searches for the configured
    company_legal_name value (default: "Innovation Ways - Unipessoal LDA") as a
    substring within the file contents. If the string is found the check passes.
    If the string is absent the check reports HUMAN_REQUIRED status.
  risk_if_failing: |
    Without a declared copyright holder, third parties cannot determine whether
    the copyright is held by the original author, the company, or is truly public
    domain. This creates legal ambiguity that can block enterprise adoption, cause
    downstream license disputes, and may violate open-source contribution agreements
    if contributors were not properly assigned.
  how_to_fix: |
    Open LICENSE and add or correct the copyright line so it includes the full
    legal entity name. For example: "Copyright 2025 Innovation Ways - Unipessoal LDA".
    Edit the file in place — this check does not auto-apply a fix.
OSS-LIC-05:
  what_it_checks: |
    The LICENSE file contains a current copyright year. Outdated years signal
    that the project may not be actively maintained, which can deter contributors
    and cause downstream packages to flag the release as stale.
  how_it_tests: |
    The check reads the LICENSE file content and extracts all four-digit year
    integers using the regex \b(19|20)\d{2}\b. It then compares the most recent
    year against the current calendar year minus one. A max year of 2024 or
    earlier fails the check in 2026.
  risk_if_failing: |
    A stale copyright year makes the project appear abandoned to new contributors
    and automated scanners. Legal teams reviewing dependency intake may reject a
    package whose copyright line has not been updated in over a year, blocking
    adoption. CI pipelines that enforce compliance gates will fail on any pull
    request that touches the LICENSE file.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` in the iw-oss-publish tooling. This rewrites the
    LICENSE file with the correct copyright year range without changing the
    license body. Alternatively, edit the LICENSE file and update the year in
    the copyright line to the current year.
OSS-LIC-06:
  what_it_checks: |
    Apache-2.0-licensed projects include a NOTICE file to document third-party attributions
    required by section 4(d) of the Apache License. The check verifies that a NOTICE file
    (NOTICE, NOTICE.md, or NOTICE.txt) exists at the project root.
  how_it_tests: |
    The check runs only when `config.license` is set to `Apache-2.0`. It calls `ctx.exists`
    with the three filename candidates (NOTICE, NOTICE.md, NOTICE.txt). If none are found,
    the check fails with severity SHOULD and `auto_fix_available=True`.
  risk_if_failing: |
    Redistribution of derivative works fails to include required attribution notices,
    exposing the project to license infringement claims from third-party contributors.
    Downstream users who build on the project may also fail to meet their own Apache-2.0
    obligations, creating friction in the supply chain.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` — it renders a NOTICE file from the
    project template, populating third-party attribution placeholders from the project's
    dependency list. Review the generated file and add any additional notices manually.
  references:
    - https://www.apache.org/licenses/LICENSE-2.0.txt
OSS-PII-01:
  what_it_checks: |
    The check scans test fixtures and data directories for email addresses that belong to real domains.
    It targets tests/, test/, fixtures/, data/, and seeds/ directories. Real email addresses in these
    directories can leak contributor or user PII when the repository is cloned, forked, or archived.
  how_it_tests: |
    The check uses ripgrep to find lines matching an email regex across the PII_SCAN_DIRS directories.
    It extracts the domain from each hit and filters it against an allowlist: example.com, example.org,
    example.net, test.invalid, and users.noreply.github.com, plus any domain ending in .example, .invalid,
    or .test. Lines whose domains do not match the allowlist are flagged as failures.
  risk_if_failing: |
    Real email addresses in test fixtures appear in every clone and fork of the repository. Search engines
    index these addresses, enabling email harvesting for spam or phishing. Contributors whose personal
    emails appear in fixtures may receive unsolicited messages if the repo becomes popular or is mirrored
    on aggregators.
  how_to_fix: |
    Replace each flagged email with an address using an allowlisted domain, such as user@example.com or
    alice@test.invalid. Delete the real address from the fixture file. There is no auto-fix template for
    this check; the contributor must edit the fixture files directly to substitute compliant values.

OSS-PII-02:
  what_it_checks: |
    The check scans fixture, test, data, and seeds directories for patterns that resemble US Social Security Numbers in the format NNN-NN-NNNN. It targets test fixtures and seed data where developers sometimes insert realistic-looking personal data for testing purposes.
  how_it_tests: |
    The check runs ripgrep recursively over the tests, test, fixtures, data, and seeds directories using the regex \b\d{3}-\d{2}-\d{4}\b to match SSN-shaped strings. It collects every hit with filename and line number, then returns the results for human review. The check requires ripgrep to be available in the environment.
  risk_if_failing: |
    If a project commits SSN-shaped test data, a reviewer who encounters the data in a code review may believe it is real PII and file a security incident, creating noise and delaying the review. In public repositories, even obviously fake SSN-shaped values can trigger automated PII scanning tools and cause the repository to be flagged or blocked by upstream compliance pipelines.
  how_to_fix: |
    Replace any SSN-shaped test values with obviously fake alternatives such as 000-00-0000 or 999-99-9999. If a fixture generation template exists in iw-oss-publish for this check, apply it to auto-replace all matching patterns in one pass.
  references:
    - https://owasp.org/www-community/controls/Information_and_Privacy_Controls

OSS-PII-03:
  what_it_checks: |
    The check examines the git commit history for distinct contributor email addresses.
    It runs `git log --all --format=%ae`, collects and deduplicates all author emails,
    and reports the count. The finding is informational and always passes when emails
    exist, cross-referencing OSS-HIST-03 for a breakdown of which emails are non-noreply.
  how_it_tests: |
    The check executes `git log --all --format=%ae` in the target repository, splits the
    output into lines, deduplicates the email addresses, and counts the results. If the
    count is greater than zero, a PASS finding is emitted with the count and a reference
    to OSS-HIST-03. If the count is zero, no finding is produced at all.
  risk_if_failing: |
    A zero count (no finding produced) means the repository either has no commit history,
    all contributors used GitHub noreply addresses, or history was stripped of emails —
    each of which affects traceability and contributor privacy guarantees differently.
    A non-zero count means contributor emails are visible in the history, enabling
    enumeration of individuals who contributed to the project.
  how_to_fix: |
    If contributor emails are present and this is expected, no action is needed.
    If you need to suppress real contributor emails, rewrite history using
    `git filter-branch` or `git-filter-repo` and re-base to replace author emails with
    `ID+username@users.noreply.github.com`. For new commits, configure
    `git config user.email ID+username@users.noreply.github.com` before committing.

OSS-REF-ALL:
  what_it_checks: |
    The check verifies that ripgrep is available in the environment before running the internal-refs family of checks. When ripgrep is absent, the entire family (OSS-REF-01 through OSS-REF-05) skips, leaving five categories of sensitive data undetected in published source files: RFC 1918 private IP addresses, internal FQDN suffixes, absolute user home paths, employee email addresses, and internal chat/tracker URLs.
  how_it_tests: |
    The check calls `ctx.has_tool("ripgrep")`. If the tool is missing, it returns a Finding with status SKIP and id OSS-REF-ALL. No file scanning occurs in this case. When ripgrep is present, each sub-check runs `rg` (ripgrep) against the target directory with glob exclusions for docs/, tests/, examples/, vendor/, node_modules/, and lock files.
  risk_if_failing: |
    Contributors cannot detect when published code contains RFC 1918 addresses, internal hostnames, home directory paths, employee email addresses, or internal Slack/Jira/Linear URLs. This creates a compliance gap in published OSS where private infrastructure details, personal identifiers, and internal tooling references remain invisible to automated scanning.
  how_to_fix: |
    Install ripgrep by running `bash .claude/skills/iw-oss-publish/scripts/install_tools.sh`. After installation, run the check again to resume the full OSS-REF-01 through OSS-REF-05 scanning suite.

OSS-REL-01:
  what_it_checks: |
    The repository root contains a changelog file under a recognized name.
    The check accepts CHANGELOG.md, CHANGELOG, HISTORY.md, or NEWS.md as valid names.
    It verifies that at least one of these files exists in the target repository root.
  how_it_tests: |
    The check calls ctx.exists with the four filename variants and records PASS
    if any match is found, otherwise FAIL. It does not inspect file content,
    only whether a file with one of the accepted names is present.
  risk_if_failing: |
    Users and maintainers have no structured record of changes between releases.
    Consumers cannot determine what changed in a given version or decide whether
    an upgrade warrants attention. Automated release tools that depend on
    changelog presence will fail or produce empty release notes.
  how_to_fix: |
    Create a CHANGELOG.md file at the repository root. The iw-oss-publish
    auto-fix for OSS-REL-01 renders CHANGELOG.md.j2, which scaffolds a
    Keep-a-Changelog skeleton with an Unreleased section. Run the auto-fix
    or create the file manually following the Keep a Changelog v1.1.0 format.
  references:
    - https://keepachangelog.com/en/1.1.0/

OSS-REL-02:
  what_it_checks: |
    Whether the project uses Conventional Commits in its recent git history. The check parses the
    subject line of the last 20 commits and matches each against the Conventional Commits format:
    type(type)!?: description. The types that satisfy the format are feat, fix, chore, docs,
    style, refactor, perf, test, build, ci, revert. Projects that adopt Conventional Commits
    enable automated release note generation, semantic version bumping, and changelog aggregation.
  how_it_tests: |
    The check runs git log with --format=%s for the most recent 20 commits in the target repository.
    Each subject line is stripped of whitespace and matched against the Conventional Commits regex
    ^^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([^)]+\))?!?:. A ratio is
    computed as conventional commits divided by total commits. A threshold of 0.70 (70%) must be
    met or exceeded for a PASS. If no commits exist the check is skipped.
  risk_if_failing: |
    Release automation cannot parse commit intent, so automated releases produce empty or incorrect
    changelogs. Contributors must manually track what changed in each release, increasing merge
    friction and the chance of shipping unlabeled or mismatched versions. CI pipelines that gate
    on this check will produce false negatives, eroding confidence in the gate itself.
  how_to_fix: |
    Rewrite or rebase commit subjects to follow the type(scope)!?: description pattern. Prefix
    features with feat:, bug fixes with fix:, and use chore:, docs:, or refactor: for
    non-user-facing changes. A rebase with git rebase -i can rewrite history to correct non-conforming
    messages. Tools such as commitlint can enforce the format at commit time; check the
    iw-oss-publish auto-fix template for a pre-commit hook configuration that validates messages
    before they enter the history.
  references:
    - https://www.conventionalcommits.org/

OSS-REL-03:
  what_it_checks: |
    The repository uses release-please with the correct GitHub Action. The check verifies that
    `.github/workflows/release-please.yml` is present and that the workflow file pins to
    `googleapis/release-please-action@v4`. The archived `google-github-actions/release-please-action`
    fork must not be used.
  how_it_tests: |
    The check reads the file `.github/workflows/release-please.yml` if it exists. It searches
    the file contents for the string `googleapis/release-please-action@v4`. A PASS requires both
    the file to be present and the correct v4 action reference to appear in the workflow YAML.
  risk_if_failing: |
    Without release-please in place, releases are cut manually. Manual releases are error-prone
    and leave no auditable trail in the commit history. If the workflow is present but still
    points to the archived fork, the action may stop working when GitHub retires the old
    `google-github-actions` namespace, breaking automated releases silently.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` to scaffold the standard release-please workflow from the project template.
    If the file already exists, update the action reference to `googleapis/release-please-action@v4`.
    Verify the workflow triggers on your release branch or tag push convention.

OSS-REL-04:
  what_it_checks: |
    At least one GitHub Actions workflow invokes the official `actions/attest-build-provenance` action.
    This action generates signed SLSA build provenance attestations for published artifacts, establishing
    a cryptographic chain from source commit to artifact digest using Sigstore-issued certificates.
  how_it_tests: |
    The check scans all `.yml` files under `.github/workflows/` in the target repository.
    It reads each file as text and checks for the literal string `actions/attest-build-provenance`.
    If any workflow contains this string the check passes; otherwise it fails.
  risk_if_failing: |
    Published artifacts carry no verifiable provenance chain. Downstream consumers—such as package
    registries, security scanners, or derivative builds—cannot confirm that a binary originated
    from the claimed source commit and CI environment. This blocks SLSA Level 2+ compliance,
    breaks supply chain trust verification in enterprise environments, and makes incident
    investigation impossible when a compromised artifact is discovered.
  how_to_fix: |
    Add the `actions/attest-build-provenance` action to a release or publish workflow, as a step
    after the artifact is built and uploaded. Run `uv run iw oss fix <CHECK_ID> --apply` which ships a release-please workflow
    that can serve as the attachment point; add the attest step to that file rather than creating
    a new one. Run the workflow on every release tag to produce attestations for each published artifact.
  references:
    - https://github.com/actions/attest-build-provenance
    - https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds
OSS-REL-05:
  what_it_checks: |
    The repository has at least one tag matching Semantic Versioning (semver) format
    (X.Y.Z, with optional 'v' prefix). The check verifies that a release tag exists
    as evidence of a versioned, reproducible snapshot of the source code.
  how_it_tests: |
    The check runs `git tag -l --sort=creatordate` in the target repository and filters
    the output through the regex `^v?\d+\.\d+\.\d+`. Any tag matching this pattern counts
    as a semver tag. If at least one match is found, the check passes.
  risk_if_failing: |
    Without a semver tag, consumers cannot reproduce a specific release, automated
    release tooling fails to detect version bumps, and provenance attestations cannot
    be anchored to a versioned artifact. This breaks SLSA build provenance attestation
    and blocks downstream dependency resolution in package managers that use tags.
  how_to_fix: |
    Tag the current commit with a semver tag: `git tag -s v0.1.0 -m 'Initial release'`
    then push it with `git push origin v0.1.0`. For automated tagging, enable
    release-please (see OSS-REL-03) which creates and pushes tags on merge to main.
  references:
    - https://semver.org/
    - https://github.com/ghatimated/gh-action-release-please
OSS-SEC-04:
  what_it_checks: |
    The repository root contains a `.gitleaks.toml` configuration file. Without an explicit
    config, gitleaks falls back to its built-in default rules, which may not cover project-specific
    secret formats such as internal API key patterns, proprietary token prefixes, or custom
    credential types.
  how_it_tests: |
    The check calls `ctx.path(".gitleaks.toml")` and tests whether the file exists on disk. It is
    a filesystem presence check, not a scan. No gitleaks invocation is involved at this stage.
  risk_if_failing: |
    Scans run with default rules only. Project-specific secret patterns slip through undetected,
    exposing API keys, internal tokens, and credentials that the default ruleset does not recognise.
    Compliance auditors may flag the absence of a documented scanning policy.
  how_to_fix: |
    Run `uv run iw oss fix <CHECK_ID> --apply` in the repository root. The fix tool writes a `.gitleaks.toml` file
    populated with Innovation Ways ruleset overrides. After generation, review the file to
    confirm it covers any project-specific credential formats not handled by the defaults.
  references:
    - https://github.com/gitleaks/gitleaks#load-configuration
OSS-SEC-05:
  what_it_checks: |
    The repository carries a detect-secrets baseline file (`.secrets.baseline`) when the project has opted into active secret scanning with detect-secrets. This file acts as an allowlist of known secret patterns and pre-existing results, preventing false positives from legacy or intentionally placed test fixtures while still catching new secrets committed after the baseline was established.
  how_it_tests: |
    The check reads the project configuration under `secrets.detect_secrets_baseline`. If that flag is set, it looks for a file named `.secrets.baseline` at the repository root (using `ctx.path(".secrets.baseline")`). It returns a PASS finding if the file exists and a FAIL finding if it does not. No active scanning is performed; the check only verifies the presence of the baseline artifact.
  risk_if_failing: |
    Without a baseline, every pre-existing test fixture or legacy placeholder that matches a secret pattern will surface as a new finding each time detect-secrets runs. This floods contributors with noise, trains reviewers to ignore alerts, and causes real credentials to be missed in the noise. For opted-in projects, the absence of a baseline is an operational gap that undermines the entire secret-scanning workflow.
  how_to_fix: |
    Generate an initial baseline by running `detect-secrets scan --baseline .secrets.baseline .` at the repository root, then audit every entry to confirm it is a known false positive or test fixture. Run `uv run iw oss fix <CHECK_ID> --apply` to scaffold the baseline with project-specific rules already configured.
  references:
    - https://github.com/Yelp/detect-secrets

OSS-TM-01:
  what_it_checks: |
    The project repository contains a TRADEMARK.md file (or variant names TRADEMARKS.md or
    docs/TRADEMARK.md). This file declares ownership of the project name, logo, and any
    reserved marks. It is the primary authoritative source for trademark governance in an
    open-source project.
  how_it_tests: |
    The check uses a file-existence probe across three candidate paths: TRADEMARK.md,
    TRADEMARKS.md, and docs/TRADEMARK.md. The probe resolves from the repository root.
    If any candidate exists, the check passes. The check does not validate the file
    contents.
  risk_if_failing: |
    Without a declared trademark policy, contributors may use the project name or logo in
    ways that create legal ambiguity or conflict with existing registered marks. A
    downstream project could adopt the same name and cause marketplace confusion. In
    jurisdictions that require active defense of trademark rights, silence can be read as
    implicit abandonment of those rights.
  how_to_fix: |
    Create a TRADEMARK.md file at the repository root. Run `uv run iw oss fix <CHECK_ID> --apply` which
    provides a template that appends a Trademark section with placeholders for the project
    name, owner, and registration status. Fill in the placeholders with the legally
    declared name and any relevant registration numbers or pending applications.
OSS-TM-06:
  what_it_checks: |
    Verifies that the project maintainer has manually searched the United States Patent and Trademark Office
    (USPTO) Trademark Database for name conflicts before publishing. The check requires a recorded search
    date in the publishing configuration, confirming that a trademark clearance search was performed.
  how_it_tests: |
    The check reads the `uspto_searched` field from the `[trademark]` section of `.iw/oss-publish.toml`. If a
    date string in YYYY-MM-DD format is present, the check passes. If the field is absent or empty, the status
    becomes HUMAN_REQUIRED and the remediation link to the USPTO search tool is returned.
  risk_if_failing: |
    Publishing a project under a name that infringes a USPTO-registered trademark exposes the organization
    to legal cease-and-desist actions, forced renaming, and removal from package registries. A human-performed
    search is required because automated checks cannot evaluate likelihood of confusion or intent.
  how_to_fix: |
    Open https://tmsearch.uspto.gov/ and run a trademark search for the intended project name. If the search
    is clear, add `uspto_searched = "YYYY-MM-DD"` to the `[trademark]` section of `.iw/oss-publish.toml`,
    substituting today's date. iw-oss-publish does not auto-apply this check—it requires manual action.

OSS-TM-07:
  what_it_checks: |
    The project records a WIPO Global Brand Database search as part of its trademark-clearance process.
    This is a manual step — no automated probe replaces the need for a human to verify the project name
    against existing trademark registrations in WIPO's global brand database.
  how_it_tests: |
    The check reads the `trademark.wipo_searched` field from `.iw/oss-publish.toml`. If the field is
    present and non-empty, the check passes. If the field is absent or blank, the check returns
    HUMAN_REQUIRED and directs the author to perform the manual search at https://branddb.wipo.int/.
  risk_if_failing: |
    Publishing under a name that conflicts with an existing registered trademark exposes the project to
    a legal demand to rename, forced rebranding, or take-down notices. Contributors and users who have
    already adopted the name face disruption. The conflict may not surface until after adoption is
    widespread, making a rename far more costly.
  how_to_fix: |
    Open https://branddb.wipo.int/ and search for the project name across all jurisdictions. If the
    search is clear, add `wipo_searched = "YYYY-MM-DD"` under `[trademark]` in `.iw/oss-publish.toml`.
    The fix template does not auto-apply this field — it requires manual entry.
OSS-TM-08:
  what_it_checks: |
    The README file contains a trademark notice when no dedicated TRADEMARK.md is present.
    Projects that skip TRADEMARK.md must still inform users about name ownership and symbol usage
    through the README. This check only runs when TRADEMARK.md, TRADEMARKS.md, or docs/TRADEMARK.md
    does not exist.
  how_it_tests: |
    The check first verifies that no TRADEMARK.md exists in the project root or docs/ directory.
    When that condition is true, it locates the README (supports README.md, README.rst, or the bare
    README filename), reads its full text content, and searches for any of three signals:
    the word "trademark" (case-insensitive), the registered-sign symbol "®", or the trademark-symbol
    "™". If at least one signal is present the check passes; otherwise it fails.
  risk_if_failing: |
    Contributors and users cannot determine name ownership from the README. Downstream packaging
    tools, registries, or code-scam detectors may incorrectly associate the project with an
    unrelated product that shares the name. Legal exposure increases if the mark is used without
    notice in jurisdictions that require it for enforcement.
  how_to_fix: |
    Add a Trademark section to the README that states the project name is a registered or common-law
    trademark and lists any applicable symbols. Run `uv run iw oss fix <CHECK_ID> --apply` which appends
    a compliant Trademark section automatically when generating a new README.

