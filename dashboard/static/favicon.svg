<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Brain/circuit hybrid: abstract brain silhouette via circuit traces and nodes -->
  <g stroke="#5865f2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere traces -->
    <path d="M8 16 L8 10 L12 6"/>
    <path d="M8 16 L6 12 L6 8"/>
    <path d="M8 16 L12 14 L14 10"/>
    <path d="M8 16 L10 20 L8 24"/>
    <path d="M8 16 L12 18 L12 22"/>

    <!-- Right hemisphere traces -->
    <path d="M24 16 L24 10 L20 6"/>
    <path d="M24 16 L26 12 L26 8"/>
    <path d="M24 16 L20 14 L18 10"/>
    <path d="M24 16 L22 20 L24 24"/>
    <path d="M24 16 L20 18 L20 22"/>

    <!-- Central spine / corpus callosum -->
    <path d="M16 4 L16 28"/>
    <path d="M8 16 L24 16"/>

    <!-- Cross connections -->
    <path d="M12 6 L16 4 L20 6"/>
    <path d="M12 22 L16 28 L20 22"/>
    <path d="M14 10 L16 9 L18 10"/>
  </g>

  <!-- Nodes at junctions -->
  <g fill="#5865f2">
    <!-- Left nodes -->
    <circle cx="8" cy="16" r="2"/>
    <circle cx="6" cy="8" r="1.2"/>
    <circle cx="12" cy="6" r="1.2"/>
    <circle cx="14" cy="10" r="1.2"/>
    <circle cx="8" cy="24" r="1.2"/>
    <circle cx="12" cy="22" r="1.2"/>
    <circle cx="10" cy="20" r="1"/>

    <!-- Right nodes -->
    <circle cx="24" cy="16" r="2"/>
    <circle cx="26" cy="8" r="1.2"/>
    <circle cx="20" cy="6" r="1.2"/>
    <circle cx="18" cy="10" r="1.2"/>
    <circle cx="24" cy="24" r="1.2"/>
    <circle cx="20" cy="22" r="1.2"/>
    <circle cx="22" cy="20" r="1"/>

    <!-- Central nodes -->
    <circle cx="16" cy="4" r="1.5"/>
    <circle cx="16" cy="28" r="1.5"/>
    <circle cx="16" cy="9" r="1"/>
    <circle cx="16" cy="16" r="1.5"/>
  </g>
</svg>
