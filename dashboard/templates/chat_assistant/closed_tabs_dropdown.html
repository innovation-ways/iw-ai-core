<!-- chat_assistant/closed_tabs_dropdown.html
     Recent-closed-tabs dropdown. Shown/hidden by chat.js.
     Positioned by chat.js via JS getBoundingClientRect on the trigger button.
-->
<div id="chat-assistant-closed-tabs-dropdown"
     class="hidden fixed z-50 bg-card border border-border rounded shadow-md"
     role="listbox"
     aria-label="Recently closed tabs"
     style="min-width: 220px; max-height: 280px; overflow-y: auto;">

  <div class="px-3 py-2">
    <div class="text-xs font-semibold text-muted-foreground uppercase tracking-wide mb-2">
      Recently Closed
    </div>
    <div id="chat-assistant-closed-tabs-list">
      <p class="text-xs text-muted-foreground italic">Loading&#x2026;</p>
    </div>
  </div>

</div>
