<style>
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-title,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-model,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-context-pct,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-tray-toggle,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-history-toggle,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-new-btn,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-messages,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-skills-tray,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-history-dropdown,
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-composer-wrap { display: none; }
  #chat-assistant-panel[data-collapsed="true"] #chat-assistant-collapse-btn { display: none; }
  #chat-assistant-panel:not([data-collapsed="true"]) #chat-assistant-expand-rail { display: none; }
</style>

<div id="chat-assistant-panel"
     class="bg-card border-r border-border flex flex-col h-full flex-shrink-0"
     style="width: 40px;"
     data-collapsed="true"
     role="region"
     aria-label="AI Assistant chat">

  <!-- Expanded header -->
  <header id="chat-assistant-header"
          class="flex items-center gap-1 px-2 py-2 border-b border-border flex-shrink-0">
    <span id="chat-assistant-title"
          class="text-sm font-medium truncate flex-1">AI Assistant</span>

    <select id="chat-assistant-model"
            class="text-xs bg-input border border-border rounded px-1 py-0.5 text-foreground focus:outline-none focus:ring-1 focus:ring-ring max-w-[90px] hidden"
            aria-label="Model selector">
      <option value="">Loading…</option>
    </select>

    <span id="chat-assistant-context-pct"
          class="text-xs text-muted-foreground hidden"
          title="Context usage"></span>

    <button id="chat-assistant-tray-toggle"
            class="tap inline-flex items-center justify-center p-1 rounded hover:bg-muted"
            aria-label="Toggle skills and commands tray"
            title="Skills &amp; Commands">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </button>

    <button id="chat-assistant-history-toggle"
            class="tap inline-flex items-center justify-center p-1 rounded hover:bg-muted"
            aria-label="Toggle session history"
            title="Session history">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </button>

    <button id="chat-assistant-new-btn"
            class="tap inline-flex items-center justify-center p-1 rounded hover:bg-muted"
            aria-label="New chat session"
            title="New chat">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
    </button>

    <button id="chat-assistant-collapse-btn"
            class="tap inline-flex items-center justify-center p-1 rounded hover:bg-muted chat-assistant-collapse-btn-distinct ml-1"
            aria-label="Collapse AI Assistant panel (Ctrl+/)"
            title="Collapse panel">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
  </header>

  <!-- Collapsed rail (visible when data-collapsed="true") -->
  <div id="chat-assistant-expand-rail"
       class="flex flex-col items-center justify-center gap-2 p-2 cursor-pointer flex-1"
       role="button"
       aria-label="Expand AI Assistant panel (Ctrl+/)">
    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <span class="text-xs font-medium" style="writing-mode: vertical-rl; transform: rotate(180deg);">AI Assistant</span>
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
  </div>

  <!-- Skills tray (toggleable) -->
  {% include "chat_assistant/skills_tray.html" %}

  <!-- History dropdown (toggleable) -->
  {% include "chat_assistant/history_dropdown.html" %}

  <!-- Messages area -->
  <div id="chat-assistant-messages"
       role="log"
       aria-live="polite"
       aria-relevant="additions"
       aria-label="AI Assistant conversation"
       class="flex-1 overflow-y-auto px-3 py-2 space-y-3">

    <div id="chat-assistant-empty-state"
         class="text-sm text-muted-foreground py-8 px-2 text-center space-y-2">
      <p class="font-medium text-foreground">AI Assistant</p>
      <p>Ask anything about this project or use a skill command.</p>
      <p class="text-xs">Press <kbd class="px-1 py-0.5 rounded border border-border bg-muted">Ctrl+/</kbd> to toggle · <kbd class="px-1 py-0.5 rounded border border-border bg-muted">/</kbd> for skills</p>
    </div>
    <div id="chat-assistant-scroll-anchor" aria-hidden="true"></div>
  </div>

  <!-- Composer -->
  <div id="chat-assistant-composer-wrap" class="flex-shrink-0">
    {% include "chat_assistant/composer.html" %}
  </div>

</div>

<!-- Approval modal mount point -->
<div id="chat-assistant-approval-root"></div>

<!-- Template for client-side message rendering -->
<template id="chat-assistant-message-template">
  {% include "chat_assistant/message.html" %}
</template>
