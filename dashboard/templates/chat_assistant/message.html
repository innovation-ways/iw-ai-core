<!-- chat_assistant/message.html
     Used both as a server-rendered fragment and as a <template> tag cloned by chat.js.
     When used in a <template> tag, the JS sets data-role and data-msg-id attributes
     before appending to the DOM.
-->
<div class="chat-assistant-message" data-role="" data-msg-id="">

  <!-- User message -->
  <div class="chat-assistant-msg-user hidden">
    <div class="flex justify-end">
      <div class="max-w-[85%] rounded-lg bg-primary text-primary-foreground px-3 py-2 text-sm">
        <span class="chat-assistant-msg-text"></span>
      </div>
    </div>
  </div>

  <!-- Assistant message -->
  <div class="chat-assistant-msg-assistant hidden">
    <div class="flex gap-2 items-start">
      <div class="flex-shrink-0 w-5 h-5 rounded-full bg-muted flex items-center justify-center mt-0.5" aria-hidden="true">
        <svg class="w-3 h-3 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="chat-assistant-msg-body chat-assistant-msg-text text-sm"></div>
      </div>
    </div>
  </div>

  <!-- Tool call -->
  <div class="chat-assistant-msg-tool-call hidden">
    <div class="rounded border border-border bg-muted/40 px-3 py-2 text-xs font-mono">
      <span class="text-muted-foreground">tool: </span>
      <span class="chat-assistant-msg-tool-name font-medium text-foreground"></span>
      <pre class="chat-assistant-msg-tool-args mt-1 text-muted-foreground overflow-x-auto whitespace-pre-wrap break-all"></pre>
    </div>
  </div>

  <!-- Tool result -->
  <div class="chat-assistant-msg-tool-result hidden">
    <div class="rounded border border-border bg-card px-3 py-2 text-xs font-mono">
      <span class="text-muted-foreground">result: </span>
      <pre class="chat-assistant-msg-result-text mt-1 text-foreground overflow-x-auto whitespace-pre-wrap break-all"></pre>
    </div>
  </div>

</div>
