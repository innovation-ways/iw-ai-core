<div id="chat-panel"
     class="h-screen sticky top-0 border-l border-border bg-card flex flex-col"
     data-collapsed="false"
     role="region"
     aria-label="Code module chat">
  <div id="chat-resize-handle" aria-hidden="true" class="absolute left-0 top-0 h-full w-1 cursor-col-resize hover:bg-primary/30"></div>
  <header class="flex items-center justify-between px-3 py-2 border-b border-border">
    <h2 class="text-sm font-medium">Chat</h2>
    <button id="chat-collapse-btn"
            class="min-h-[44px] min-w-[44px] inline-flex items-center justify-center"
            aria-label="Collapse chat panel (Cmd+\)">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </header>
  <div id="chat-messages" role="log" aria-live="polite" aria-relevant="additions" aria-label="Conversation" class="flex-1 overflow-y-auto px-3 py-2 space-y-3">
    <div id="chat-scroll-anchor" aria-hidden="true"></div>
  </div>
  <div id="chat-scroll-to-bottom-wrap" class="relative">
    <button id="chat-scroll-to-bottom"
            class="hidden absolute bottom-2 right-3 rounded-full bg-primary text-primary-foreground px-3 py-1 text-xs min-h-[44px] min-w-[44px]"
            aria-label="Jump to latest">
      ↓ Latest
    </button>
  </div>
  {% include "chat/composer.html" %}
</div>

<button id="chat-drawer-open"
        class="lg:hidden fixed bottom-4 right-4 rounded-full bg-primary text-primary-foreground p-3 shadow-lg min-h-[44px] min-w-[44px] inline-flex items-center justify-center"
        aria-label="Open chat panel">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h12M12 8v8"/>
  </svg>
</button>

<div id="chat-drawer-backdrop"
     class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"
     aria-hidden="true"></div>

<div id="chat-drawer"
     class="fixed inset-y-0 right-0 z-50 w-full max-w-sm bg-card border-l border-border flex flex-col
            translate-x-full lg:translate-x-0 lg:static lg:z-auto lg:w-auto lg:max-w-none lg:border-l-0 lg:flex lg:flex-1 lg:overflow-hidden
            transition-transform duration-200 ease-in-out
            lg:translate-x-0"
     aria-label="Chat drawer"
     aria-modal="true">
  <div class="flex items-center justify-between px-3 py-2 border-b border-border lg:hidden">
    <h2 class="text-sm font-medium">Chat</h2>
    <button id="chat-drawer-close"
            class="min-h-[44px] min-w-[44px] inline-flex items-center justify-center"
            aria-label="Close chat drawer">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="flex-1 overflow-y-auto px-3 py-2 space-y-3" id="chat-drawer-messages">
  </div>
  <div id="chat-drawer-scroll-to-bottom-wrap" class="relative">
    <button id="chat-drawer-scroll-to-bottom"
            class="hidden absolute bottom-2 right-3 rounded-full bg-primary text-primary-foreground px-3 py-1 text-xs min-h-[44px] min-w-[44px]"
            aria-label="Jump to latest">
      ↓ Latest
    </button>
  </div>
  {% include "chat/composer.html" %}
</div>
