<div class="mb-6 p-4 bg-amber-50 border border-amber-300 rounded-lg">
  <div class="flex items-start gap-3">
    <svg class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <div>
      <h4 class="text-sm font-semibold text-amber-800">Editorial Lint Warnings (last generation)</h4>
      <ul class="mt-2 space-y-1.5">
        {% for warning in lint_warnings %}
        <li class="text-sm text-amber-700">
          <span class="font-mono text-xs bg-amber-100 px-1.5 py-0.5 rounded">{{ warning.rule }}</span>
          {{ warning.message }}
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
