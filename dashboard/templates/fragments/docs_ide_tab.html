<div class="grid grid-cols-1 lg:grid-cols-5 gap-4">
  <div class="lg:col-span-3 space-y-4">
    <div class="bg-card border border-border rounded-lg p-4">
      <h2 class="text-sm font-semibold text-foreground mb-3 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Guide Editor
      </h2>
      <div hx-get="/project/{{ project_id }}/api/docs/{{ doc_id }}/guide/type"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="flex items-center justify-center py-8 text-muted-foreground text-sm">Loading type guide...</div>
      </div>
    </div>

    <div class="bg-card border border-border rounded-lg p-4">
      <h2 class="text-sm font-semibold text-foreground mb-3 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Instance Guide
      </h2>
      <div hx-get="/project/{{ project_id }}/api/docs/{{ doc_id }}/guide/instance"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="flex items-center justify-center py-8 text-muted-foreground text-sm">Loading instance guide...</div>
      </div>
    </div>

    <div class="bg-card border border-border rounded-lg p-4">
      <h2 class="text-sm font-semibold text-foreground mb-3 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        Section Guides
      </h2>
      <div hx-get="/project/{{ project_id }}/api/docs/{{ doc_id }}/guide/sections"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="flex items-center justify-center py-8 text-muted-foreground text-sm">Loading sections...</div>
      </div>
    </div>
  </div>

  <div class="lg:col-span-2">
    <div class="bg-card border border-border rounded-lg p-4 sticky top-4">
      <h2 class="text-sm font-semibold text-foreground mb-3 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Section Diff Viewer
      </h2>
      <div hx-get="/project/{{ project_id }}/api/docs/{{ doc_id }}/diff/sections"
           hx-trigger="load"
           hx-swap="innerHTML"
           hx-include="[name='v1'],[name='v2']">
        <div class="flex items-center justify-center py-8 text-muted-foreground text-sm">Loading diff viewer...</div>
      </div>
    </div>
  </div>
</div>
