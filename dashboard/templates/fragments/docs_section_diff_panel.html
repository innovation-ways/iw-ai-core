<div class="p-4 border rounded-lg bg-card">
  <h3 class="font-semibold text-sm mb-3">Section Diff</h3>
  <div class="space-y-2 mb-3">
    <div class="flex gap-2 items-center">
      <label class="text-xs text-muted-foreground">v1</label>
      <input type="number" id="diff-v1" min="1" value="1"
             class="w-16 text-xs border rounded px-2 py-1 bg-background" />
      <label class="text-xs text-muted-foreground ml-2">v2</label>
      <input type="number" id="diff-v2" min="2" value="2"
             class="w-16 text-xs border rounded px-2 py-1 bg-background" />
      <button type="button"
              hx-get="/project/{{ project_id }}/api/docs/{{ doc_id }}/diff/sections"
              hx-include="[id='diff-v1'],[id='diff-v2']"
              hx-vals='{"v1": document.getElementById("diff-v1").value, "v2": document.getElementById("diff-v2").value}'
              hx-trigger="click"
              hx-target="#diff-sections-result"
              hx-swap="innerHTML"
              class="px-3 py-1 text-xs bg-secondary text-secondary-foreground rounded hover:bg-secondary/80">
        Compare
      </button>
    </div>
  </div>
  <div id="diff-sections-result" class="text-xs text-muted-foreground">
    <p class="text-center py-4">Enter version numbers and click Compare.</p>
  </div>
</div>
