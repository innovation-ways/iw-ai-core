<div id="code-components-section" class="px-6 py-5 border-t border-border">
  <div class="flex items-baseline justify-between mb-3">
    <h3 class="text-sm font-semibold text-foreground">Components</h3>
    {% if modules %}
      <span class="text-xs text-muted-foreground tabular-nums">{{ modules | length }}</span>
    {% endif %}
  </div>
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-3">
    {% for module in modules %}
    <a href="/api/projects/{{ project_id }}/code/modules/{{ module.slug }}"
       hx-get="/api/projects/{{ project_id }}/code/modules/{{ module.slug }}"
       hx-target="#code-detail-panel"
       hx-swap="innerHTML"
       class="group block bg-card border border-border rounded-lg px-3.5 py-3 transition-all duration-150
              hover:border-primary/60 hover:ring-2 hover:ring-primary/15 hover:-translate-y-0.5
              focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring">
      <div class="flex items-start justify-between gap-2 mb-1">
        <h4 title="{{ module.name }}"
            class="text-sm font-semibold text-foreground leading-tight truncate group-hover:text-primary transition-colors">
          {{ module.name }}
        </h4>
        <svg class="w-3.5 h-3.5 text-muted-foreground opacity-0 group-hover:opacity-100 group-hover:text-primary
                    transition-opacity shrink-0 mt-0.5"
             fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </div>
      <code class="block text-[11px] text-muted-foreground font-mono truncate mb-1.5">{{ module.path }}</code>
      <p class="text-xs text-muted-foreground leading-snug line-clamp-2">{{ module.description }}</p>
    </a>
    {% else %}
    <p class="text-sm text-muted-foreground col-span-full">No components found.</p>
    {% endfor %}
  </div>
</div>
