<div id="code-components-section">
  <h3 class="text-sm font-semibold text-muted-foreground uppercase tracking-wide mb-3">Components</h3>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for module in modules %}
    <div class="bg-muted/30 border border-border rounded-lg p-4 hover:border-primary/50 transition-colors">
      <div class="flex items-start justify-between mb-2">
        <code class="text-xs text-muted-foreground">{{ module.path }}</code>
      </div>
      <h4 class="font-semibold text-sm mb-1">{{ module.name }}</h4>
      <p class="text-xs text-muted-foreground mb-3">{{ module.description }}</p>
      <a href="/api/projects/{{ project_id }}/code/modules/{{ module.slug }}"
         hx-get="/api/projects/{{ project_id }}/code/modules/{{ module.slug }}"
         hx-target="#code-detail-panel"
         hx-swap="innerHTML"
         class="text-xs text-primary hover:underline">View →</a>
    </div>
    {% else %}
    <p class="text-sm text-muted-foreground col-span-full">No components found.</p>
    {% endfor %}
  </div>
</div>
