{# Self-contained per-provider usage bars — served by GET /api/usage/llm/embed
   Loaded in an <iframe> by external dashboards (e.g. gethomepage.dev). All
   styling lives in this <style> block (NO inline style="" attributes, which
   some browser policies/extensions strip); transparent background so it blends
   into the host card. #}
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="dark light" />
  <style>
    html, body { margin: 0; padding: 0; background: transparent; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; justify-content: center; gap: 4px;
      height: 100vh; overflow: hidden;
    }
    .row { display: flex; align-items: center; gap: 8px; font-size: 12px; line-height: 1; }
    .lbl { min-width: 62px; color: #94a3b8; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .track { flex: 1; height: 6px; background: rgba(148, 163, 184, 0.25); border-radius: 9999px; overflow: hidden; }
    .fill { height: 100%; border-radius: 9999px; transition: width 0.7s ease; }
    .pct { min-width: 34px; text-align: right; font-weight: 600; color: #e2e8f0; font-variant-numeric: tabular-nums; }
    .warn { font-size: 12px; color: #f59e0b; }
    {% for w in windows %}
    .fill-{{ loop.index0 }} { width: {{ w.pct }}%; background: {{ w.color }}; }
    {% endfor %}
  </style>
</head>
<body>
  {% if warning %}
  <div class="warn">⚠ {{ warning }}</div>
  {% else %}
  {% for w in windows %}
  <div class="row">
    <span class="lbl">{{ w.label }}</span>
    <span class="track"><span class="fill fill-{{ loop.index0 }}"></span></span>
    <span class="pct">{{ w.pct }}%</span>
  </div>
  {% endfor %}
  {% endif %}
</body>
</html>
