{# Failed code index job banner — shows the most recent error so the user
   can see why indexing stopped and retry. #}
<div class="flex items-start justify-between gap-3 px-3 py-2 bg-destructive/10 border border-destructive/40 rounded-lg text-xs">
  <div class="flex items-start gap-2 min-w-0">
    <svg class="w-3.5 h-3.5 flex-shrink-0 text-destructive mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M4.93 19h14.14a2 2 0 001.74-3L13.74 4a2 2 0 00-3.48 0L3.19 16a2 2 0 001.74 3z"/>
    </svg>
    <div class="min-w-0 flex-1">
      <p class="font-medium text-destructive">Indexing failed</p>
      {% if last_failed_error %}
      <p class="text-muted-foreground mt-0.5 break-words">{{ last_failed_error }}</p>
      {% endif %}
    </div>
  </div>
  <a href="/project/{{ project_id }}/jobs/code_mapping/{{ last_failed_job.id }}"
     class="text-destructive hover:underline flex-shrink-0">
    Details →
  </a>
</div>
