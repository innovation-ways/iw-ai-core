{% set archive_url = "/project/" ~ project_id ~ "/api/batch/" ~ batch_id ~ "/archive" %}
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
     onclick="if(event.target===this)document.getElementById('confirm-dialog').innerHTML=''">
  <div class="bg-card border border-border p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
    <h3 class="text-lg font-semibold text-card-foreground">Archive batch {{ batch_id }}?</h3>

    <!-- Toggle row -->
    <div class="flex items-center gap-3 mt-4">
      <button
        id="post-cmd-toggle"
        type="button"
        role="switch"
        aria-checked="true"
        onclick="togglePostCommands()"
        class="relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-primary transition-colors focus:outline-none">
        <span class="translate-x-4 inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform"></span>
      </button>
      <span class="text-sm text-muted-foreground" id="post-cmd-label">Run post-merge commands</span>
    </div>

    <!-- Description -->
    <p class="text-muted-foreground text-sm mt-3" id="archive-description">
      Archives this batch: runs post-merge commands (alembic migrations, docker rebuilds) and archives all work items. This runs in the background.
    </p>

    <div class="flex gap-3 mt-5 justify-end">
      <button
        onclick="document.getElementById('confirm-dialog').innerHTML=''"
        class="px-4 py-2 bg-secondary text-secondary-foreground rounded-md text-sm font-medium hover:opacity-90 transition-opacity">
        Cancel
      </button>
      <button
        id="archive-confirm-btn"
        hx-post="{{ archive_url }}"
        hx-swap="none"
        onclick="setTimeout(function(){document.getElementById('confirm-dialog').innerHTML=''},50)"
        class="px-4 py-2 rounded-md text-sm font-medium hover:opacity-90 transition-opacity bg-primary text-primary-foreground">
        Archive
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  var runPostCmds = true;
  var baseUrl = {{ archive_url | tojson }};

  function togglePostCommands() {
    runPostCmds = !runPostCmds;
    var toggle = document.getElementById('post-cmd-toggle');
    var thumb = toggle.querySelector('span');
    var label = document.getElementById('post-cmd-label');
    var desc = document.getElementById('archive-description');
    var btn = document.getElementById('archive-confirm-btn');

    toggle.setAttribute('aria-checked', runPostCmds ? 'true' : 'false');
    if (runPostCmds) {
      toggle.classList.remove('bg-muted');
      toggle.classList.add('bg-primary');
      thumb.classList.remove('translate-x-0');
      thumb.classList.add('translate-x-4');
      label.textContent = 'Run post-merge commands';
      desc.textContent = 'Archives this batch: runs post-merge commands (alembic migrations, docker rebuilds) and archives all work items. This runs in the background.';
      btn.setAttribute('hx-post', baseUrl);
    } else {
      toggle.classList.remove('bg-primary');
      toggle.classList.add('bg-muted');
      thumb.classList.remove('translate-x-4');
      thumb.classList.add('translate-x-0');
      label.textContent = 'Skip post-merge commands';
      desc.textContent = 'Archive this batch: don\'t run post-merge commands. Only moves files to archive and updates the database.';
      btn.setAttribute('hx-post', baseUrl + '?skip_post_commands=true');
    }
    // Re-process htmx attributes on the button
    htmx.process(btn);
  }

  window.togglePostCommands = togglePostCommands;
})();
</script>
