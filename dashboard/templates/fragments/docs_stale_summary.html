{% if stale_count > 0 %}
<div id="stale-summary-content" class="mb-4 p-4 bg-amber-500/10 border border-amber-500/20 rounded-lg dark:bg-amber-900/20 dark:border-amber-700/30">
  <div class="flex items-start justify-between gap-4">
    <div class="flex items-start gap-3">
      <svg class="w-5 h-5 text-amber-600 dark:text-amber-300 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      <div>
        <p class="text-sm font-medium text-amber-700 dark:text-amber-300">
          {{ stale_count }} document{{ 's' if stale_count != 1 else '' }} {{ 'are' if stale_count != 1 else 'is' }} stale — their source files have changed since last generation.
        </p>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <button
        hx-post="/project/{{ project_id }}/api/docs/regenerate-stale"
        hx-target="#stale-summary"
        hx-swap="innerHTML"
        class="px-3 py-1.5 bg-muted hover:bg-muted/80 text-foreground text-sm font-medium rounded-md border border-border transition-colors">
        Regenerate All Stale
      </button>
      <button
        onclick="dismissStaleSummary()"
        class="px-3 py-1.5 bg-transparent hover:bg-muted text-muted-foreground hover:text-foreground text-sm font-medium rounded-md border border-border transition-colors">
        Dismiss
      </button>
    </div>
  </div>
</div>
<script>
function dismissStaleSummary() {
  var el = document.getElementById('stale-summary-content');
  if (el) {
    el.innerHTML = '<p class="text-sm text-amber-700 dark:text-amber-300">Stale summary hidden for 24h. <button onclick="location.reload()" class="underline hover:no-underline">Reload</button> to show again.</p>';
    localStorage.setItem('docs-stale-dismissed', Date.now().toString());
  }
}
(function() {
  var dismissed = localStorage.getItem('docs-stale-dismissed');
  if (dismissed && Date.now() - parseInt(dismissed) < 86400000) {
    var el = document.getElementById('stale-summary-content');
    if (el) el.style.display = 'none';
  }
})();
</script>
{% else %}
<div id="stale-summary-content" class="mb-4 hidden"></div>
{% endif %}
