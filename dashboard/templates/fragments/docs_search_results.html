{% if docs %}
  {% for doc in docs %}
    {% include "fragments/docs_card.html" %}
  {% endfor %}
{% else %}
  <!-- Empty State -->
  <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
    <svg class="w-12 h-12 text-muted-foreground/50 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <h3 class="text-lg font-semibold text-foreground mb-2">No documents match your search</h3>
    <p class="text-muted-foreground text-sm max-w-sm">
      Try adjusting your search query or filters to find what you're looking for.
    </p>
  </div>
{% endif %}
