<div class="p-4 border rounded-lg bg-card">
  <h3 class="font-semibold text-sm mb-2">Instance Guide
    <span class="text-xs text-muted-foreground ml-1">(overrides type guide)</span>
  </h3>
  {% if instance_guide is none %}
  <div class="mb-3 text-sm text-muted-foreground italic">Inheriting from type guide</div>
  {% endif %}
  <form hx-post="/project/{{ project_id }}/api/docs/{{ doc_id }}/guide/instance"
        hx-target="this" hx-swap="outerHTML">
    <textarea name="guide_md" rows="12"
              class="w-full font-mono text-xs border rounded p-2 bg-background resize-y"
              placeholder="No instance guide — leave empty to inherit type guide.">{{ instance_guide or '' }}</textarea>
    <div class="flex items-center gap-2 mt-2">
      <button type="submit"
              class="px-3 py-1.5 text-xs bg-primary text-primary-foreground rounded hover:bg-primary/90">
        Save Instance Guide
      </button>
      {% if instance_guide %}
      <button type="button"
              hx-delete="/project/{{ project_id }}/api/docs/{{ doc_id }}/guide/instance"
              hx-target="this"
              hx-swap="outerHTML"
              class="px-3 py-1.5 text-xs border border-red-200 text-red-600 rounded hover:bg-red-50">
        Delete Override
      </button>
      {% endif %}
    </div>
  </form>
</div>
