# IW AI Core — Project Registry
# Add projects here. Daemon re-reads on SIGHUP or file change.

[projects.innoforge]
display_name = "InnoForge Document Platform"
repo_root = "/home/sergiog/dev/iw-doc-plan/main/iw-doc-plan"
enabled = true

[projects.iw-ai-core]
display_name = "IW AI Core Platform"
repo_root = "/home/sergiog/dev/iw-doc-plan/main/iw-ai-core"
enabled = true
self_assess = true

[projects.iw-ai-core.ai_assistant]
models = [
  "anthropic/claude-opus-4-7",
  "anthropic/claude-sonnet-4-6",
  "minimax/MiniMax-M2.7",
  "openai/gpt-5.3-codex",
  "ollama/gemma4:26b",
]
default_model = "anthropic/claude-opus-4-7"

[[projects.iw-ai-core.services]]
name = "daemon"
watch_paths = ["orch/**", "executor/**"]
ignore_paths = ["**/tests/**", "**/*.md"]
restart_command = "./ai-core.sh daemon restart"
detect = { type = "pidfile", path = ".daemon.pid" }

[[projects.iw-ai-core.services]]
name = "dashboard"
watch_paths = ["dashboard/**", "orch/**"]
ignore_paths = ["**/tests/**", "**/*.md"]
restart_command = "bin/restart-dashboard.sh"
detect = { type = "pidfile", path = ".dashboard.pid" }

[projects.iw-ai-core.alembic]
config = "alembic.ini"
# db_url_env intentionally omitted — iw-ai-core's alembic env.py
# already resolves the URL via orch.config.get_db_url() from
# IW_CORE_DB_HOST/PORT/NAME/USER/PASSWORD in .env, so the alembic
# subprocess inherits the parent environment unchanged.

[projects.cv]
display_name = "Curriculum Vitae"
repo_root = "/home/sergiog/dev/iw-doc-plan/main/cv"
enabled = true

[projects.Podforger]
display_name = "Podforger"
repo_root = "/home/sergiog/dev/iw-doc-plan/main/podforger"
enabled = true
