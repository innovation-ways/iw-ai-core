name: Test & Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint, format, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --frozen
      - run: make lint
      - run: make test-assertions
      - run: make format-check || make format
      - run: make typecheck

  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    # CI has no .env file. tests/conftest.py's `_arm_live_db_guard` fixture
    # sets these to a blocked address, but pytest *collection* (which imports
    # test modules — some transitively pull in `dashboard.routers.*` which
    # eagerly resolves `SessionLocal` and therefore `IW_CORE_DB_HOST`) runs
    # *before* fixtures. Set the same blocked values at the job level so
    # imports succeed; the fixture still hijacks any leakage at runtime.
    env:
      IW_CORE_DB_HOST: "127.0.0.1"
      IW_CORE_DB_PORT: "1"
      IW_CORE_DB_NAME: "iw_orch_test_blocked"
      IW_CORE_DB_USER: "blocked"
      IW_CORE_DB_PASSWORD: "blocked"
      IW_CORE_DASHBOARD_HOST: "127.0.0.1"
      IW_CORE_DASHBOARD_PORT: "9900"
      IW_CORE_POLL_INTERVAL: "60"
      IW_CORE_STALL_THRESHOLD: "300"
      IW_CORE_PID_FILE: "/tmp/iw-orch-daemon.pid"
      IW_CORE_ARCHIVE_DIR: "/tmp/iw-archive"
      IW_CORE_ARCHIVE_TTL: "30"
      IW_CORE_LOG_LEVEL: "INFO"
      IW_CORE_LOG_FILE: "/tmp/iw-ai-core.log"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      # Several unit tests (test_migration_rebase, test_batch_archiver) shell
      # out to `git commit` against tmp_path repos and need a global identity.
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@iw-ai-core.local"
          git config --global user.name "iw-ai-core CI"
      - run: uv sync --frozen
      - run: make test-unit
      - name: Upload coverage XML artefact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-xml
          path: tests/output/coverage/coverage.xml

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: iw
          POSTGRES_PASSWORD: iw
          POSTGRES_DB: iw_ai_core
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U iw"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      IW_CORE_DB_HOST: localhost
      IW_CORE_DB_PORT: "5433"
      IW_CORE_DB_NAME: iw_ai_core
      IW_CORE_DB_USER: iw
      IW_CORE_DB_PASSWORD: iw
      IW_CORE_DASHBOARD_HOST: localhost
      IW_CORE_DASHBOARD_PORT: "9900"
      IW_CORE_POLL_INTERVAL: "60"
      IW_CORE_STALL_THRESHOLD: "300"
      IW_CORE_PID_FILE: "/tmp/iw-orch-daemon.pid"
      IW_CORE_ARCHIVE_DIR: "/tmp/iw-archive"
      IW_CORE_ARCHIVE_TTL: "30"
      IW_CORE_LOG_LEVEL: "INFO"
      IW_CORE_LOG_FILE: "/tmp/iw-ai-core.log"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      # Several integration tests (migration_rebase_conflict, parallel_migrations,
      # batch_archiver, etc.) shell out to `git commit`, which requires a global
      # identity. CI runners ship without one — set a placeholder.
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@iw-ai-core.local"
          git config --global user.name "iw-ai-core CI"
      - run: uv sync --frozen
      # Some tests (test_doc_job_log_endpoints, test_alembic_guard_banner) hit
      # the dashboard's get_db dependency which connects to IW_CORE_DB_*
      # (the GH services postgres on 5433), not a testcontainer. That DB
      # ships empty — apply schema before tests so they don't fail with
      # "relation 'projects' does not exist".
      - name: Apply alembic migrations to services postgres
        run: uv run alembic upgrade head
      - run: make test-integration

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: iw
          POSTGRES_PASSWORD: iw
          POSTGRES_DB: iw_ai_core
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U iw"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      IW_CORE_DB_HOST: localhost
      IW_CORE_DB_PORT: "5433"
      IW_CORE_DB_NAME: iw_ai_core
      IW_CORE_DB_USER: iw
      IW_CORE_DB_PASSWORD: iw
      IW_CORE_DASHBOARD_HOST: localhost
      IW_CORE_DASHBOARD_PORT: "9900"
      IW_CORE_POLL_INTERVAL: "60"
      IW_CORE_STALL_THRESHOLD: "300"
      IW_CORE_PID_FILE: "/tmp/iw-orch-daemon.pid"
      IW_CORE_ARCHIVE_DIR: "/tmp/iw-archive"
      IW_CORE_ARCHIVE_TTL: "30"
      IW_CORE_LOG_LEVEL: "INFO"
      IW_CORE_LOG_FILE: "/tmp/iw-ai-core.log"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@iw-ai-core.local"
          git config --global user.name "iw-ai-core CI"
      - run: uv sync --frozen
      - name: Apply alembic migrations to services postgres
        run: uv run alembic upgrade head
      - run: make smoke
