# Release Please — automated release PRs and tagging from Conventional Commits
# Docs: https://github.com/googleapis/release-please-action
#
# On every push to main, Release Please maintains an open PR. Merging that PR
# creates the release: tag, GitHub Release, and (if configured) artifact publish
# with SLSA build provenance attestation.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write       # required for build provenance attestation
  attestations: write   # required for actions/attest-build-provenance

jobs:
  release-please:
    name: Create or update release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          release-type: python
          # Optional: specify a manifest config file for monorepos:
          # config-file: release-please-config.json
          # manifest-file: .release-please-manifest.json

  build-and-attest:
    name: Build and attest artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout at released tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # TODO: Add project-specific build step here that produces artifacts in ./dist
      # Example for Python:
      # - uses: astral-sh/setup-uv@v4
      # - run: uv build
      #
      # Example for Node:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: lts/*
      # - run: npm ci && npm run build
      #
      # Example for Go:
      # - uses: actions/setup-go@v5
      #   with:
      #     go-version: stable
      # - run: go build -o dist/ ./...

      - name: Generate build provenance attestation
        if: hashFiles('dist/**') != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/**"

      - name: Upload artifacts to the GitHub Release
        if: hashFiles('dist/**') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber
