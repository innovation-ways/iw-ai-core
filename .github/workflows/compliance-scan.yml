# IW OSS compliance scan — runs iw-oss-publish in scan mode on every PR and push.
# Exits non-zero on any MUST-level finding, gating merges.

name: IW OSS Compliance Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"  # weekly, Monday 05:00 UTC — catches drift

permissions:
  contents: read
  security-events: write  # upload SARIF findings

jobs:
  compliance:
    name: Pre-publish compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret scanning)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install compliance tools
        env:
          # gh release download (the preferred install path) needs an
          # authenticated gh CLI. The runner provides GITHUB_TOKEN but
          # doesn't expose it as GH_TOKEN by default.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .claude/skills/iw-oss-publish/scripts/install_tools.sh

      - name: Run iw-oss-publish scan
        run: |
          # TODO: replace with the wrapper invocation once Phase 1 lands.
          # For now, invoke the underlying tools directly to get gating
          # coverage for secrets and action pinning.
          set -euo pipefail
          mkdir -p .iw

          # Secrets in working tree
          gitleaks detect \
            --no-git \
            --source . \
            --report-format sarif \
            --report-path .iw/gitleaks-tree.sarif \
            --exit-code 1 || echo "SECRETS_FOUND_TREE=1" >> "$GITHUB_ENV"

          # Secrets across history
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --report-format sarif \
            --report-path .iw/gitleaks-history.sarif \
            --exit-code 1 || echo "SECRETS_FOUND_HISTORY=1" >> "$GITHUB_ENV"

          # SHA-pinned actions
          pinact run --check

      - name: Honor .iw/oss-accepted.yaml — downgrade matched findings
        if: hashFiles('.iw/gitleaks-tree.sarif') != '' || hashFiles('.iw/oss-publish.sarif') != ''
        run: |
          set -euo pipefail
          for sarif in .iw/gitleaks-tree.sarif .iw/gitleaks-history.sarif .iw/oss-publish.sarif; do
            [ -e "$sarif" ] || continue
            python3 .claude/skills/iw-oss-publish/scripts/honor_accepted.py \
              --sarif "$sarif" \
              --accepted .iw/oss-accepted.yaml \
              --out "$sarif"
          done

      - name: Recompute fail-on-MUST gate after accept-honoring
        run: |
          set -euo pipefail
          if [ -f .iw/oss-publish-findings.json ]; then
            python3 - <<'PY'
          import json, sys, yaml, hashlib
          from pathlib import Path

          accepted_path = Path(".iw/oss-accepted.yaml")
          accepted = (yaml.safe_load(accepted_path.read_text()) if accepted_path.exists() else {}) or {}
          keys = {(e["check_id"], e["finding_hash"]) for e in accepted.get("accepted", [])}

          def fh(check_id, summary, evidence):
              h = hashlib.sha256()
              h.update(check_id.encode()); h.update(b"\x00")
              h.update(summary.encode()); h.update(b"\x00")
              if evidence is not None:
                  h.update(json.dumps(evidence, sort_keys=True, separators=(",", ":")).encode())
              return h.hexdigest()[:16]

          findings = json.loads(Path(".iw/oss-publish-findings.json").read_text())
          unaccepted = [
              f for f in findings.get("findings", [])
              if f.get("severity") == "MUST"
              and f.get("status") == "fail"
              and (f["check_id"], fh(f["check_id"], f["summary"], f.get("evidence"))) not in keys
          ]
          if unaccepted:
              print(f"::error::{len(unaccepted)} unaccepted MUST finding(s)", file=sys.stderr)
              for f in unaccepted:
                  print(f"  - {f['check_id']}: {f['summary']}", file=sys.stderr)
              sys.exit(1)
          PY
          fi

      # SARIF uploads target the GitHub Code Scanning service, which on private
      # repos requires GitHub Advanced Security. Skip while private; uploads
      # resume automatically once the repo is published.
      - name: Upload gitleaks SARIF (tree)
        if: always() && !github.event.repository.private && hashFiles('.iw/gitleaks-tree.sarif') != ''
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: .iw/gitleaks-tree.sarif
          category: gitleaks-tree

      - name: Upload gitleaks SARIF (history)
        if: always() && !github.event.repository.private && hashFiles('.iw/gitleaks-history.sarif') != ''
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: .iw/gitleaks-history.sarif
          category: gitleaks-history
