[project]
name = "iw-ai-core"
version = "0.1.0"
requires-python = ">=3.12"

dependencies = [
    # Database
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.1",
    "alembic>=1.13",
    # CLI
    "click>=8.1",
    "rich>=13.0",
    # Dashboard
    "fastapi>=0.136.1",
    "uvicorn[standard]>=0.30",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    # Archive
    "zstandard>=0.23",
    # Diagrams
    "Pillow>=10.0",
    # Config
    "python-dotenv>=1.0",
    # tomllib is stdlib in 3.12+
    "markdown>=3.10.2",
    "markupsafe>=3.0.3",
    "types-markdown>=3.10.2.20260408",
    "llama-index-core>=0.14.20",
    "llama-index-llms-ollama>=0.10.1",
    "llama-index-embeddings-ollama>=0.9.0",
    "llama-index-vector-stores-lancedb>=0.5.0",
    "lancedb>=0.30.2",
    "tree-sitter>=0.25.2",
    "tree-sitter-languages>=1.10.2",
    "pandas>=3.0.2",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "testcontainers[postgres]>=4.0",
    "factory-boy>=3.3",
    "freezegun>=1.4",

    # Quality
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",

    # Type stubs
    "types-freezegun",
    "httpx>=0.27",
]

[project.scripts]
iw = "orch.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orch", "dashboard"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "testcontainers[postgres]>=4.0",
    "factory-boy>=3.3",
    "freezegun>=1.4",
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",
    "types-freezegun",
    "httpx>=0.27",
    "allure-pytest>=2.15.3",
    "types-pyyaml>=6.0.12.20260408",
    "beautifulsoup4>=4.14.3",
]

# --- Ruff ---
[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["skills/", ".claude/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "DTZ", "T20", "ICN", "PIE", "PT", "RSE", "RET", "SLF", "SIM", "TCH", "ARG", "PTH", "ERA"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "ARG001", "ARG002", "SLF001", "S603", "S607", "TC003", "S110", "S108"]  # assert ok; fixture side effects; private access in tests ok; git subprocess in test fixtures
"orch/db/migrations/**" = ["E501", "TC003"]  # migration files: long column definitions; Sequence used at runtime in upgrade()
"dashboard/routers/**" = ["B008", "PT028"]  # FastAPI Depends() in default args is canonical; PT028 false-positives on route params
"dashboard/services/oss_service.py" = ["S603", "S607", "S108"]  # git subprocess; /tmp paths for worktrees
"scripts/backfill_functional_doc.py" = ["S603", "S607"]  # opencode subprocess; agent script
"orch/test_runner.py" = ["S602", "S603", "S607"]  # shell=True and npx are intentional for running user-configured test commands
"orch/doc_service.py" = ["S603", "S607"]  # git log is intentional for staleness detection

# --- mypy ---
[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
plugins = ["sqlalchemy.ext.mypy.plugin"]

# --- pytest ---
[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration (require docker/testcontainer)",
]
env = ["IW_CORE_AGENT_CONTEXT="]
