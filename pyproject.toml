[project]
name = "iw-ai-core"
version = "0.1.0"
requires-python = ">=3.12"

dependencies = [
    # Database
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.1",
    "alembic>=1.13",
    # CLI
    "click>=8.1",
    "rich>=13.0",
    # Dashboard
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    # Archive
    "zstandard>=0.23",
    # Diagrams
    "Pillow>=10.0",
    # Config
    "python-dotenv>=1.0",
    # tomllib is stdlib in 3.12+
    "markdown>=3.10.2",
    "markupsafe>=3.0.3",
    "types-markdown>=3.10.2.20260408",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "testcontainers[postgres]>=4.0",
    "factory-boy>=3.3",
    "freezegun>=1.4",

    # Quality
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",

    # Type stubs
    "types-freezegun",
    "httpx>=0.27",
]

[project.scripts]
iw = "orch.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orch", "dashboard"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "testcontainers[postgres]>=4.0",
    "factory-boy>=3.3",
    "freezegun>=1.4",
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",
    "types-freezegun",
    "httpx>=0.27",
]

# --- Ruff ---
[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["skills/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "DTZ", "T20", "ICN", "PIE", "PT", "RSE", "RET", "SLF", "SIM", "TCH", "ARG", "PTH", "ERA"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "ARG001", "ARG002", "SLF001"]  # assert ok; fixture side effects; private access in tests ok
"orch/db/migrations/**" = ["E501"]  # migration files have long column definitions
"dashboard/routers/**" = ["B008"]  # FastAPI Depends() in default args is the canonical pattern

# --- mypy ---
[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
plugins = ["sqlalchemy.ext.mypy.plugin"]

# --- pytest ---
[tool.pytest.ini_options]
testpaths = ["tests"]
