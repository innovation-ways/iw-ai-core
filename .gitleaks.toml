# Gitleaks configuration for IW AI Core Platform
# Generated by iw-oss-publish. Customize per-project rules below.
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "IW AI Core Platform gitleaks config"

# Extend the default gitleaks ruleset (recommended — inherits ~150 built-in detectors)
[extend]
useDefault = true

# ---------------------------------------------------------------
# IW-specific custom rules
# ---------------------------------------------------------------

[[rules]]
id = "iw-internal-email"
description = "Internal Innovation Ways employee email address"
regex = '''[a-zA-Z0-9._%+-]+@(?:innovation-ways\.com)'''
tags = ["internal", "pii"]

[[rules]]
id = "iw-internal-fqdn"
description = "Internal Innovation Ways hostname (.internal, .corp, .local, .lan, .intranet)"
regex = '''[a-zA-Z0-9][a-zA-Z0-9-]{0,62}\.(?:internal|corp|local|lan|intranet)\b'''
tags = ["internal", "infra"]

[[rules]]
id = "iw-rfc1918-ip"
description = "RFC 1918 private IP address (likely internal infrastructure reference)"
regex = '''\b(?:10(?:\.[0-9]{1,3}){3}|172\.(?:1[6-9]|2[0-9]|3[01])(?:\.[0-9]{1,3}){2}|192\.168(?:\.[0-9]{1,3}){2})\b'''
tags = ["internal", "infra"]

# ---------------------------------------------------------------
# Allowlists — paths and values that should NOT trigger findings
# ---------------------------------------------------------------

[allowlist]
description = "Global allowlists for IW AI Core Platform"

# Skip documentation, test fixtures, generated artefacts, vendored
# dependencies, build output, lockfiles, and the skill's own output.
#
# IMPORTANT: gitleaks emits absolute paths when invoked with --source <abs>,
# so each regex must match anywhere in the path (anchor `(?:^|/)`), not just
# at the start of a relative path.
paths = [
  '''(?i)(?:^|/)docs/''',
  '''(?i)(?:^|/)tests/fixtures/''',
  '''(?i)(?:^|/)examples/''',
  '''(?i)(?:^|/)\.iw/''',
  '''(?i)(?:^|/)\.git/''',
  '''(?i)(?:^|/)\.venv/''',
  '''(?i)(?:^|/)venv/''',
  '''(?i)(?:^|/)node_modules/''',
  '''(?i)(?:^|/)dist/''',
  '''(?i)(?:^|/)build/''',
  '''(?i)(?:^|/)__pycache__/''',
  '''(?i)(?:^|/)logs?/''',
  '''(?i)(?:^|/)allure-report/''',
  '''(?i)(?:^|/)allure-results/''',
  '''(?i)(?:^|/)coverage/''',
  '''(?i)(?:^|/)htmlcov/''',
  '''(?i)\.pyc$''',
  '''(?i)\.lock$''',
  '''(?i)(?:^|/)package-lock\.json$''',
  '''(?i)(?:^|/)yarn\.lock$''',
  '''(?i)(?:^|/)pnpm-lock\.yaml$''',
  '''(?i)(?:^|/)uv\.lock$''',
  '''(?i)(?:^|/)poetry\.lock$''',
  '''(?i)(?:^|/)Pipfile\.lock$''',
  '''(?i)\.min\.(?:js|css)$''',
]

# Common example-value patterns that are not real secrets.
regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',            # AWS docs example key
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',  # AWS docs example secret
  '''(?i)example\.(com|org|net|invalid)''',
  '''(?i)localhost''',
  '''(?i)127\.0\.0\.1''',
  '''(?i)0\.0\.0\.0''',
  '''(?i)\btest\b.*\btoken\b''',         # "test token" in prose
]

# Per-rule allowlists — finer control when the rule catches false positives.
# [[rules]]
# id = "aws-access-token"
# [rules.allowlist]
# regexes = ['''AKIA[0-9A-Z]{16}_SANDBOX''']

# ---------------------------------------------------------------
# Tips for tuning
# ---------------------------------------------------------------
#
# - Add real false-positive patterns to `allowlist.regexes` as they surface.
# - Add per-rule allowlists (by rule id) to avoid blanket allowlists.
# - Run locally: gitleaks detect --source . --no-git --verbose
# - Scan history: gitleaks detect --source . --log-opts="--all"
