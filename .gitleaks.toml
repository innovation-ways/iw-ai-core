# Gitleaks configuration for IW AI Core Platform
# Generated by iw-oss-publish. Customize per-project rules below.
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "IW AI Core Platform gitleaks config"

# Extend the default gitleaks ruleset (recommended — inherits ~150 built-in detectors)
[extend]
useDefault = true

# ---------------------------------------------------------------
# IW-specific custom rules
# ---------------------------------------------------------------

[[rules]]
id = "iw-internal-email"
description = "Internal Innovation Ways employee email address"
regex = '''[a-zA-Z0-9._%+-]+@(?:innovation-ways\.com)'''
tags = ["internal", "pii"]

[[rules]]
id = "iw-internal-fqdn"
description = "Internal Innovation Ways hostname (.internal, .corp, .local, .lan, .intranet)"
regex = '''[a-zA-Z0-9][a-zA-Z0-9-]{0,62}\.(?:internal|corp|local|lan|intranet)\b'''
tags = ["internal", "infra"]

[[rules]]
id = "iw-rfc1918-ip"
description = "RFC 1918 private IP address (likely internal infrastructure reference)"
regex = '''\b(?:10(?:\.[0-9]{1,3}){3}|172\.(?:1[6-9]|2[0-9]|3[01])(?:\.[0-9]{1,3}){2}|192\.168(?:\.[0-9]{1,3}){2})\b'''
tags = ["internal", "infra"]

# ---------------------------------------------------------------
# Allowlists — paths and values that should NOT trigger findings
# ---------------------------------------------------------------

[allowlist]
description = "Global allowlists for IW AI Core Platform"

# Skip documentation, test fixtures, generated artefacts, vendored
# dependencies, build output, lockfiles, and the skill's own output.
#
# IMPORTANT: gitleaks emits absolute paths when invoked with --source <abs>,
# so each regex must match anywhere in the path (anchor `(?:^|/)`), not just
# at the start of a relative path.
paths = [
  '''(?i)(?:^|/)docs/''',
  '''(?i)(?:^|/)tests/fixtures/''',
  '''(?i)(?:^|/)examples/''',
  '''(?i)(?:^|/)\.iw/''',
  '''(?i)(?:^|/)\.git/''',
  '''(?i)(?:^|/)\.venv/''',
  '''(?i)(?:^|/)venv/''',
  '''(?i)(?:^|/)node_modules/''',
  '''(?i)(?:^|/)dist/''',
  '''(?i)(?:^|/)build/''',
  '''(?i)(?:^|/)__pycache__/''',
  # I-00085: tool-managed cache directories — same rationale as __pycache__/
  # above. .mypy_cache/ in particular contains vendored type-stub strings
  # (e.g., *.local) that match the iw-internal-fqdn rule.
  '''(?i)(?:^|/)\.mypy_cache/''',
  '''(?i)(?:^|/)\.ruff_cache/''',
  '''(?i)(?:^|/)\.pytest_cache/''',
  # why: .hypothesis/ — Hypothesis internal cache files contain example strings
  # (e.g., "env.local") that match the iw-internal-fqdn rule; not real secrets.
  '''(?i)(?:^|/)\.hypothesis/''',
  # why: tests/output/ — gitleaks JSON report contains matches of its own findings
  # (e.g., "env.local" from the report); not real secrets.
  '''(?i)(?:^|/)tests/output/''',
  '''(?i)(?:^|/)logs?/''',
  '''(?i)(?:^|/)allure-report/''',
  '''(?i)(?:^|/)allure-results/''',
  '''(?i)(?:^|/)coverage/''',
  '''(?i)(?:^|/)htmlcov/''',
  # why: tests/unit/ — RFC 6761 reserved test domains (.local), RFC 1918 IPs, and
  # secret-shaped fixture strings in unit tests for browser-env, OSS secrets-parser,
  # staleness, and dashboard services. Entire directory is test code, not secrets.
  '''(?i)(?:^|/)tests/unit/''',
  # why: tests/integration/ — same patterns as tests/unit/ in integration test fixtures
  '''(?i)(?:^|/)tests/integration/''',
  # why: tests/dashboard/ — dashboard integration test fixtures
  '''(?i)(?:^|/)tests/dashboard/''',
  # why: ai-dev/ — design docs, prompts, and working files (example.local, foo.local,
  # info@innovation-ways.com appear in prose, not in real credentials)
  '''(?i)(?:^|/)ai-dev/''',
  # why: .tmp/ — temporary working files during agent execution
  '''(?i)(?:^|/)\.tmp/''',
  # why: .env — gitignored development credential file; contains dev credentials
  # (e.g., IW_BROWSER_E2E_USER=dev@example.local) that are not real secrets.
  # Excluded from git history entirely; gitleaks should skip it too.
  '''(?i)\.env$''',
  # why: skills/iw-oss-publish/ — published skill copies with info@innovation-ways.com
  # contact email in prose (not a secret — published in public README/CODE_OF_CONDUCT)
  '''(?i)(?:^|/)skills/iw-oss-publish/''',
  # why: orch/oss/ config + fix_recipe files contain info@innovation-ways.com in
  # governance YAML fields (contact info published in public docs, not a secret)
  '''(?i)(?:^|/)orch/oss/''',
  # why: dashboard/services/oss_check_catalog.yaml — YAML config keys named env.local
  # and info@innovation-ways.com contact; not real hostnames or credentials
  '''(?i)(?:^|/)dashboard/services/''',
  # why: .env — contains example values (e.g. example.local); always gitignored, never committed
  '''(?i)(?:^|/)\.env$''',
  # why: .dockerignore, .gitignore — patterns like "env.local" appear as literal
  # ignore rules, not as real internal hostnames
  '''(?i)\.dockerignore$''',
  '''(?i)\.gitignore$''',
  # why: Dockerfile.e2e and GH workflows — "iw-ai-core.local" is a Docker service name
  # in compose templates, not a real internal hostname
  '''(?i)(?:^|/)Dockerfile\.e2e$''',
  '''(?i)(?:^|/)Dockerfile$''',
  '''(?i)(?:^|/)\.github/workflows/''',
  # why: public docs — README, CODE_OF_CONDUCT, CONTRIBUTING, SECURITY, SUPPORT all
  # publish info@innovation-ways.com as a public contact address
  '''(?i)(?:^|/)README\.md$''',
  '''(?i)(?:^|/)CODE_OF_CONDUCT\.md$''',
  '''(?i)(?:^|/)CONTRIBUTING\.md$''',
  '''(?i)(?:^|/)SECURITY\.md$''',
  '''(?i)(?:^|/)SUPPORT\.md$''',
  # why: orch/daemon/browser_env.py — example .iw-orch.json config embedded in a
  # docstring with e2e_user: dev@example.local (fixture string, not a real credential)
  '''(?i)(?:^|/)orch/daemon/browser_env\.py''',
  # why: .iw-orch.json — Docker compose template references docker.internal as a
  # Docker service name, not a real internal hostname
  '''(?i)(?:^|/)\.iw-orch\.json$''',
  '''(?i)\.pyc$''',
  '''(?i)\.lock$''',
  '''(?i)(?:^|/)package-lock\.json$''',
  '''(?i)(?:^|/)yarn\.lock$''',
  '''(?i)(?:^|/)pnpm-lock\.yaml$''',
  '''(?i)(?:^|/)uv\.lock$''',
  '''(?i)(?:^|/)poetry\.lock$''',
  '''(?i)(?:^|/)Pipfile\.lock$''',
  '''(?i)\.min\.(?:js|css)$''',
]

# Common example-value patterns that are not real secrets.
regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',            # AWS docs example key
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',  # AWS docs example secret
  '''(?i)example\.(com|org|net|invalid|local)''',
  '''(?i)localhost''',
  '''(?i)127\.0\.0\.1''',
  '''(?i)0\.0\.0\.0''',
  '''(?i)\btest\b.*\btoken\b''',         # "test token" in prose
]

# Per-rule allowlists — finer control when the rule catches false positives.
# [[rules]]
# id = "aws-access-token"
# [rules.allowlist]
# regexes = ['''AKIA[0-9A-Z]{16}_SANDBOX''']

# ---------------------------------------------------------------
# Tips for tuning
# ---------------------------------------------------------------
#
# - Add real false-positive patterns to `allowlist.regexes` as they surface.
# - Add per-rule allowlists (by rule id) to avoid blanket allowlists.
# - Run locally: gitleaks detect --source . --no-git --verbose
# - Scan history: gitleaks detect --source . --log-opts="--all"
